<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Giveaway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
    .light .glass { background: rgba(255,255,255,0.88); border-color: rgba(0,0,0,0.12); }
    .light body, .light h1, .light label { color: #1f2937; }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-4xl font-bold">Giveaway Tool</h1>
      <div class="flex gap-3">
        <button onclick="toggleTheme()" id="themeBtn" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">
          <i class="fas fa-moon"></i>
        </button>
        <button onclick="connectWallet()" id="connectBtn" class="px-6 py-3 bg-white text-black font-semibold rounded-2xl flex items-center gap-2">
          <i class="fas fa-wallet"></i> <span id="connectText">Connect Wallet</span>
        </button>
      </div>
    </div>

    <div id="successMessage" class="hidden glass border border-emerald-500/30 bg-emerald-500/10 rounded-3xl p-6 mb-8 text-emerald-400"></div>

    <div class="glass border border-white/10 rounded-3xl p-8">
      <!-- فرم‌ها -->
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-gray-400 text-sm mb-2">Token</label>
          <select id="tokenSelect" class="w-full rounded-2xl px-6 py-5"> 
            <option value="0x3600000000000000000000000000000000000000">USDC</option>
            <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
            <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Total Amount</label>
          <input type="number" id="totalAmount" value="100" step="0.000001" class="w-full rounded-2xl px-6 py-5 text-2xl">
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Number of Winners</label>
        <input type="number" id="winnerCount" value="10" min="1" class="w-full rounded-2xl px-6 py-5 text-2xl">
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Description</label>
        <textarea id="description" rows="2" class="w-full rounded-2xl px-6 py-5" placeholder="Example: First 10 commenters win..."></textarea>
      </div>

      <div class="flex gap-3 mb-8">
        <button onclick="generateTweetText()" class="flex-1 py-4 bg-[#1DA1F2] rounded-2xl font-medium">Twitter Text</button>
        <button onclick="selectRandomWinners()" class="flex-1 py-4 bg-purple-600 rounded-2xl font-medium">🎲 Random Select</button>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-3">Winner Addresses</label>
        <textarea id="winnersList" rows="7" class="w-full rounded-2xl px-6 py-5 font-mono text-sm" placeholder="One address per line"></textarea>
      </div>

      <button id="sendBtn" onclick="sendGiveawaySplit()" 
              class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-7 rounded-3xl text-xl font-bold">
        Send Split to Winners
      </button>
    </div>
  </div>

<script>
// ... (کدهای قبلی toggleTheme, connectWallet, generateTweetText, selectRandomWinners همان قبلی)

let isProcessing = false;

async function sendGiveawaySplit() {
  if (!signer) return alert("Please connect your wallet first!");
  if (isProcessing) return;

  const listText = document.getElementById("winnersList").value.trim();
  if (!listText) return alert("Please enter winner addresses!");

  const addresses = listText.split("\n").map(a => a.trim()).filter(a => ethers.isAddress(a));
  if (addresses.length === 0) return alert("No valid addresses!");

  const totalAmount = parseFloat(document.getElementById("totalAmount").value);
  const tokenAddr = document.getElementById("tokenSelect").value;
  const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;

  if (!confirm(`Send ${totalAmount} ${symbol} to ${addresses.length} winners?`)) return;

  isProcessing = true;
  const btn = document.getElementById("sendBtn");
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "Processing Transaction...";

  try {
    const tokenContract = new ethers.Contract(tokenAddr, [
      "function approve(address,uint256) returns (bool)",
      "function decimals() view returns (uint8)"
    ], signer);

    const decimals = await tokenContract.decimals();
    const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);

    await (await tokenContract.approve(CONTRACT_ADDRESS, totalWei)).wait();

    const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
    const tx = await contract.splitPayment(tokenAddr, addresses, new Array(addresses.length).fill(10000), totalWei, { gasLimit: 800000 });
    await tx.wait();

    // Success Message
    document.getElementById("successMessage").innerHTML = `
      ✅ Transaction Successful!<br>
      <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" class="underline">
        View on Explorer → ${tx.hash.substring(0,12)}...
      </a>`;
    document.getElementById("successMessage").classList.remove('hidden');

    alert("🎉 Giveaway sent successfully!");

  } catch (error) {
    console.error(error);
    alert("Transaction failed: " + (error.reason || error.message));
  } finally {
    isProcessing = false;
    btn.disabled = false;
    btn.textContent = originalText;
  }
}
</script>
</body>
</html>
