<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f23; color: #fff; margin: 0; padding: 20px; }
    .container { max-width: 700px; margin: auto; }
    h1 { text-align: center; color: #00d4ff; }
    textarea, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #1f1f3a; color: white; }
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .btn-primary { background: #00d4ff; color: black; font-weight: bold; }
    .status { padding: 15px; margin: 10px 0; border-radius: 8px; background: #1f1f3a; }
    .history { margin-top: 30px; }
    a { color: #00d4ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Arc USDC Splitter</h1>
    
    <button id="connectButton" class="btn-primary" onclick="connectWallet()">Connect MetaMask</button>
    
    <textarea id="intentInput" rows="4" placeholder="Example: Send 100 USDC, 40% to 0x123..., 60% to 0x456..."></textarea>
    
    <button id="sendButton" class="btn-primary" onclick="sendSplit()" disabled>Send Split Transaction</button>
    
    <div id="status" class="status"></div>
    
    <div class="history">
      <h2>Transaction History</h2>
      <button onclick="exportHistory()">Export History (JSON)</button>
      <button onclick="clearHistory()">Clear History</button>
      <div id="historyList"></div>
    </div>
  </div>

<script>
// ==================== ARC TESTNET CONFIG ====================
const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";
const CHAIN_ID = "0x13b2";                    // 5042 in hex
const RPC_URL = "https://rpc.testnet.arc.network";
const EXPLORER_URL = "https://testnet.arcscan.app";

const NETWORK_PARAMS = {
  chainId: CHAIN_ID,
  chainName: "Arc Testnet",
  nativeCurrency: {
    name: "USDC",
    symbol: "USDC",
    decimals: 18
  },
  rpcUrls: [RPC_URL],
  blockExplorerUrls: [EXPLORER_URL]
};

let provider, signer, currentAccount;

// ==================== CONNECT WALLET ====================
async function connectWallet() {
  if (!window.ethereum) {
    alert("MetaMask is not installed!");
    return;
  }

  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    currentAccount = accounts[0];

    const switched = await switchToArcNetwork();
    if (!switched) return;

    document.getElementById('connectButton').innerHTML = `✅ Connected: ${currentAccount.slice(0,6)}...${currentAccount.slice(-4)}`;
    document.getElementById('sendButton').disabled = false;

    showStatus("✅ Connected to Arc Testnet", "green");
  } catch (error) {
    console.error(error);
    alert("Connection failed: " + error.message);
  }
}

// ==================== SWITCH / ADD NETWORK ====================
async function switchToArcNetwork() {
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: CHAIN_ID }]
    });
    return true;
  } catch (switchError) {
    if (switchError.code === 4902) {
      try {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [NETWORK_PARAMS]
        });
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: CHAIN_ID }]
        });
        return true;
      } catch (addError) {
        console.error(addError);
        alert("Failed to add Arc Testnet. Please add it manually.");
        return false;
      }
    } else {
      alert("Switch failed: " + switchError.message);
      return false;
    }
  }
}

// ==================== SEND SPLIT ====================
async function sendSplit() {
  const text = document.getElementById('intentInput').value.trim();
  if (!text) return alert("Please enter intent text");

  const { addresses, percentages, totalAmount } = parseIntent(text);
  
  if (addresses.length === 0 || addresses.length !== percentages.length) {
    return alert("Invalid addresses or percentages");
  }

  try {
    showStatus("Preparing transaction...", "blue");

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    const abi = [
      "function splitPayment(address[] recipients, uint256[] percentages, uint256 totalAmount)"
    ];

    const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);
    const totalWei = ethers.parseUnits(totalAmount.toString(), 18);

    showStatus("Waiting for signature...", "blue");

    const tx = await contract.splitPayment(addresses, percentages, totalWei);
    showStatus(`Transaction sent! Hash: ${tx.hash}`, "blue");

    await tx.wait();
    showStatus(`✅ Success! <a href="${EXPLORER_URL}/tx/${tx.hash}" target="_blank">View on Explorer</a>`, "green");

    addToHistory(text, tx.hash);

  } catch (error) {
    console.error(error);
    showStatus("Error: " + error.message, "red");
  }
}

// ==================== PARSE INTENT ====================
function parseIntent(text) {
  const addressPattern = /0x[a-fA-F0-9]{40}/g;
  const percentPattern = /(\d+)%/g;
  const amountPattern = /(\d+)\s*USDC/i;

  const addresses = text.match(addressPattern) || [];
  const percentMatches = text.match(percentPattern) || [];
  const percentages = percentMatches.map(p => parseInt(p));
  const amountMatch = text.match(amountPattern);
  const totalAmount = amountMatch ? parseInt(amountMatch[1]) : 100;

  return { addresses, percentages, totalAmount };
}

// ==================== HISTORY ====================
function addToHistory(intent, hash) {
  let history = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
  history.unshift({
    time: new Date().toLocaleString(),
    intent: intent.substring(0, 80),
    hash: hash
  });
  localStorage.setItem('arcTxHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
  let html = '<ul>';
  history.forEach(item => {
    html += `<li>${item.time} - ${item.intent}... <a href="${EXPLORER_URL}/tx/${item.hash}" target="_blank">View</a></li>`;
  });
  html += '</ul>';
  document.getElementById('historyList').innerHTML = html;
}

function exportHistory() {
  const data = localStorage.getItem('arcTxHistory');
  if (!data) return alert("No history");
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'arc-history.json'; a.click();
}

function clearHistory() {
  if (confirm("Clear history?")) {
    localStorage.removeItem('arcTxHistory');
    renderHistory();
  }
}

function showStatus(message, color) {
  const el = document.getElementById('status');
  el.innerHTML = message;
  el.style.background = color === "green" ? "#004d00" : color === "red" ? "#4d0000" : "#00334d";
}

window.onload = renderHistory;
</script>
</body>
</html>
