<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Pro - Token Splitter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
    }
    
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
    }
    .light .glass {
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.12);
    }

    .light body, .light h1, .light h3, .light label, .light .text-white {
      color: #1f2937;
    }
    .light .text-gray-400 { color: #64748b; }

    select, input {
      background-color: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .light select, .light input {
      background-color: #f8fafc;
      color: #1f2937;
      border: 1px solid #e2e8f0;
    }

    select option {
      background-color: #1a1a2e;
      color: white;
      padding: 12px 16px;
    }
    .light select option {
      background-color: #f8fafc;
      color: #1f2937;
    }

    .invalid {
      border-color: #ef4444 !important;
      animation: shake 0.3s;
    }

    .percent-container, .amount-container {
      position: relative;
    }
    .percent-container::after {
      content: "%";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-weight: 600;
      pointer-events: none;
    }
    .light .percent-container::after {
      color: #64748b;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .preview-scroll {
      max-height: 320px;
      overflow-y: auto;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <div id="logoContainer" class="relative">
          <div id="glowRing"></div>
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" class="relative z-10 drop-shadow-2xl">
            <circle cx="26" cy="26" r="23" stroke="url(#grad1)" stroke-width="3" stroke-opacity="0.6"/>
            <circle cx="26" cy="26" r="20" fill="#0f172a"/>
            <text x="26" y="37" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="url(#grad2)" text-anchor="middle" dominant-baseline="middle">A</text>
            <line x1="18" y1="32" x2="34" y2="32" stroke="#67e8f9" stroke-width="2.5" stroke-opacity="0.9"/>
            <defs>
              <linearGradient id="grad1" x1="10" y1="10" x2="42" y2="42" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#10b981"/>
                <stop offset="100%" stop-color="#22d3ee"/>
              </linearGradient>
              <linearGradient id="grad2" x1="15" y1="15" x2="38" y2="38" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#67e8f9"/>
                <stop offset="100%" stop-color="#34d399"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

    <div>
      <h1 class="text-4xl font-bold">ArcSplit Pro</h1>
      <p class="text-gray-400">Professional Token Splitter</p>
    </div>
  </div>
  <div class="flex gap-3">
    <button onclick="toggleTheme()" id="themeBtn" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all">
      <i class="fas fa-moon text-xl"></i>
    </button>
    <button onclick="showConnectModal()" id="connectBtn" 
            class="px-6 py-3 bg-white text-black font-semibold rounded-2xl flex items-center gap-2 hover:bg-gray-100 transition-all">
      <i class="fas fa-wallet"></i> 
      <span id="connectText">Connect Wallet</span>
    </button>
  </div>
</div>

<div id="status" class="glass border border-white/10 rounded-3xl p-6 mb-8 text-base font-medium">Ready to split tokens on Arc Testnet.</div>
<div id="successMessage" class="hidden glass border border-emerald-500/30 bg-emerald-500/10 rounded-3xl p-6 mb-8 text-emerald-400"></div>

<div class="glass border border-white/10 rounded-3xl p-8 mb-8">
  <div class="mb-8">
    <label class="block text-gray-400 text-sm mb-2">Select Token</label>
    <select id="tokenSelect" onchange="handleTokenChange()" 
            class="w-full rounded-2xl px-6 py-5 focus:border-emerald-500 outline-none text-base">
      <option value="0x3600000000000000000000000000000000000000">USDC</option>
      <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
      <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
      <option value="custom">Add Custom Token...</option>
    </select>
  </div>

  <div class="mb-8">
    <label class="block text-gray-400 text-sm mb-2">Total Amount</label>
    <div class="flex gap-3">
      <input type="number" id="totalAmount" value="100" step="0.000001" 
             class="flex-1 bg-white/5 border border-white/20 rounded-2xl px-6 py-5 text-3xl outline-none" oninput="updateAll()">
      <button onclick="setMaxAmount()" class="px-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">MAX</button>
    </div>
  </div>

  <div class="mb-6">
    <div class="flex justify-between mb-4">
      <h3 class="font-semibold">Recipients</h3>
      <div class="flex gap-3 items-center">
        <div class="flex bg-white/10 rounded-2xl p-1 text-sm">
          <button onclick="setMode('manual')" id="manualBtn"
                  class="mode-btn px-5 py-2 rounded-xl font-medium transition-all">Manual</button>
          <button onclick="setMode('auto')" id="autoBtn"
                  class="mode-btn px-5 py-2 rounded-xl font-medium transition-all">Auto</button>
        </div>
        <button onclick="showImportModal()" class="text-sky-400 hover:text-sky-300 flex items-center gap-1 text-sm">
          <i class="fas fa-upload"></i> Import
        </button>
        <button onclick="addRecipient()" class="text-emerald-400 hover:text-emerald-300 flex items-center gap-1">
          <i class="fas fa-plus"></i> Add
        </button>
      </div>
    </div>
    <div id="recipients-list" class="space-y-4"></div>
  </div>

  <div class="mb-8">
    <h4 class="text-gray-400 text-sm mb-3">Split Preview</h4>
    <div class="glass rounded-2xl overflow-hidden">
      <div class="preview-scroll">
        <table class="w-full">
          <thead>
            <tr class="border-b border-white/10 sticky top-0 bg-[#1a1a2e]">
              <th class="text-left p-4 text-gray-400">Recipient</th>
              <th class="text-right p-4 text-gray-400">Percent</th>
              <th class="text-right p-4 text-gray-400">Amount</th>
            </tr>
          </thead>
          <tbody id="preview-body" class="text-sm"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="flex justify-between mb-8">
    <span id="percent-total" class="font-bold text-lg">Total: 0%</span>
    <button onclick="distributeRemaining()" class="text-amber-400 hover:text-amber-300">Distribute Remaining</button>
  </div>

  <button id="sendBtn" onclick="sendSplit()" 
          class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-7 rounded-3xl text-xl font-bold">
    Send Split Transaction
  </button>
</div>

<div class="glass border border-white/10 rounded-3xl p-8">
  <h3 class="font-semibold mb-4">Recent Transactions</h3>
  <div id="history" class="space-y-3 max-h-80 overflow-auto"></div>
</div>  

  <!-- Import Modal -->
  <div id="importModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-8 max-w-md w-full mx-4">
      <h3 class="text-xl font-bold mb-4">Import Recipients</h3>
      <textarea id="importText" rows="8" 
                class="w-full bg-white/5 border border-white/20 rounded-2xl p-5 text-sm font-mono"
                placeholder="0x1234567890abcdef1234567890abcdef12345678,50"></textarea>
      <p class="text-xs text-gray-400 mt-2">Format: address,percent (one per line)</p>
      <div class="flex gap-3 mt-6">
        <button onclick="hideImportModal()" class="flex-1 py-4 rounded-2xl border border-white/20 hover:bg-white/10">Cancel</button>
        <button onclick="importRecipients()" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl">Import</button>
      </div>
    </div>
  </div>

  <!-- Wallet Connect Modal -->
  <div id="connectModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass border border-white/10 rounded-3xl p-8 max-w-md w-full mx-4">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Connect Wallet</h3>
        <button onclick="hideConnectModal()" class="text-gray-400 hover:text-white text-3xl leading-none">×</button>
      </div>
      
  <div class="space-y-3">
    <button onclick="connectMetaMask()" 
            class="w-full flex items-center gap-4 p-5 rounded-2xl hover:bg-white/10 transition-all group">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" width="40" height="40" alt="MetaMask">
      <div class="text-left">
        <div class="font-semibold text-lg">MetaMask</div>
        <div class="text-sm text-gray-400">Popular browser wallet</div>
      </div>
    </button>

    <button onclick="connectWalletConnect()" 
            class="w-full flex items-center gap-4 p-5 rounded-2xl hover:bg-white/10 transition-all group">
      <img src="https://walletconnect.com/_next/static/media/walletconnect.2f8f1b5a.svg" width="40" height="40" alt="WalletConnect">
      <div class="text-left">
        <div class="font-semibold text-lg">WalletConnect</div>
        <div class="text-sm text-gray-400">Connect with mobile wallets</div>
      </div>
    </button>
  </div>

  <p class="text-center text-xs text-gray-500 mt-8">
    By connecting, you accept our Terms of Service
  </p>
</div>  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 border border-white/20 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-50">
    <span id="toastText"></span>
  </div>

  <script>
    let signer = null;
    let userAddress = null;
    let provider = null;
    let transactions = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
    let isProcessing = false;
    let splitMode = 'manual';

    const CONTRACT_ADDRESS = "0x73Da94F0D960Ef8FD49Ed28a94f667aF3C062cB2";
    const ARC_CHAIN_ID = 5042002;

    const splitterAbi = [
      {
        "inputs": [
          { "name": "token", "type": "address" },
          { "name": "recipients", "type": "address[]" },
          { "name": "percentages", "type": "uint256[]" },
          { "name": "totalAmount", "type": "uint256" }
        ],
        "name": "splitPayment",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
      }
    ];

    function showToast(msg, duration = 4000) {
      const toast = document.getElementById("toast");
      document.getElementById("toastText").innerHTML = msg;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), duration);
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('light');
      const icon = document.getElementById("themeBtn").querySelector("i");
      if (icon.classList.contains("fa-moon")) {
        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
      } else {
        icon.classList.remove("fa-sun");
        icon.classList.add("fa-moon");
      }
    }

    function showConnectModal() {
      document.getElementById("connectModal").classList.remove("hidden");
    }

    function hideConnectModal() {
      document.getElementById("connectModal").classList.add("hidden");
    }

    async function connectMetaMask() {
      hideConnectModal();
      if (!window.ethereum) return showToast("MetaMask not found!");

      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        const network = await provider.getNetwork();
        if (network.chainId !== BigInt(ARC_CHAIN_ID)) {
          showToast("Please switch to <b>Arc Testnet</b> (Chain ID: 5042002)", 6000);
          return;
        }
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        signer = await provider.getSigner();

        document.getElementById("logoContainer").classList.add("connected");
        updateConnectButton();
        showToast("Wallet connected successfully");
        await updateBalance();
      } catch (e) {
        console.error(e);
        showToast("Failed to connect wallet");
      }
    }

    async function connectWalletConnect() {
      hideConnectModal();
      showToast("WalletConnect will be available soon", 3000);
    }

    function updateConnectButton() {
      const btn = document.getElementById("connectBtn");
      const short = userAddress ? `${userAddress.slice(0,6)}...${userAddress.slice(-4)}` : "";
      btn.innerHTML = `<i class="fas fa-wallet"></i> <span>${short}</span>`;
      btn.onclick = disconnectWallet;
      btn.classList.add("!bg-emerald-500", "!text-white");
    }

    function disconnectWallet() {
      signer = null; userAddress = null; provider = null;
      document.getElementById("logoContainer").classList.remove("connected");
      const btn = document.getElementById("connectBtn");
      btn.innerHTML = `<i class="fas fa-wallet"></i> <span>Connect Wallet</span>`;
      btn.onclick = showConnectModal;
      btn.classList.remove("!bg-emerald-500", "!text-white");
      document.getElementById("status").innerHTML = "Ready to split tokens on Arc Testnet.";
      showToast("Wallet disconnected");
    }

    function getTotalAmount() {
      return parseFloat(document.getElementById("totalAmount").value) || 0;
    }

    function updateAll() {
      updateRecipientsAmounts();
      updatePercentTotal();
      updatePreview();
    }

    function updateRecipientsAmounts() {
      const total = getTotalAmount();
      document.querySelectorAll('.recipient-row').forEach(row => {
        const perc = parseFloat(row.querySelector('.percent').value) || 0;
        row.querySelector('.amount').value = (total * perc / 100).toFixed(6);
      });
    }

    function setMode(mode) {
      splitMode = mode;
      document.getElementById('manualBtn').classList.toggle('bg-white/20', mode === 'manual');
      document.getElementById('autoBtn').classList.toggle('bg-white/20', mode === 'auto');
      if (mode === 'auto') autoDistributePercentages();
    }

    function addRecipient(address = "", percent = "") {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row glass border border-white/10 rounded-2xl p-5 flex items-center gap-4";
      row.innerHTML = `
        <input type="text" class="address flex-1 bg-transparent border border-white/20 rounded-xl px-5 py-4 text-white placeholder-gray-400" 
               placeholder="0x..." value="${address}" oninput="validateAddress(this); updateAll()">
        
        <div class="percent-container w-28">
          <input type="text" class="percent w-full bg-transparent border border-white/20 rounded-xl px-5 py-4 text-center text-white" 
                 value="${percent}" placeholder="" 
                 oninput="handlePercentChange(this); updateAll()">
        </div>

        <div class="amount-container w-36">
          <input type="text" class="amount w-full bg-transparent border border-white/20 rounded-xl px-5 py-4 text-center text-white" 
                 placeholder="" 
                 oninput="handleAmountChange(this); updateAll()">
        </div>

        <button onclick="this.parentElement.remove(); updateAll(); if(splitMode==='auto') autoDistributePercentages();" class="text-rose-400 text-3xl px-3">×</button>
      `;
      list.appendChild(row);

      if (splitMode === 'auto') autoDistributePercentages();
    }

    function autoDistributePercentages() {
      const rows = document.querySelectorAll('.recipient-row');
      if (rows.length === 0) return;

      const totalBasis = 10000;
      const base = Math.floor(totalBasis / rows.length);
      let total = 0;

      rows.forEach((row, index) => {
        const percentInput = row.querySelector('.percent');
        let value = base;
        if (index === rows.length - 1) value = totalBasis - total;
        percentInput.value = (value / 100).toFixed(6);
        total += value;
      });

      if (rows.length >= 3) showToast("Last recipient slightly increased to reach exactly 100%", 3000);
      updateAll();
    }

    function handlePercentChange(input) {
      if (splitMode === 'auto') {
        autoDistributePercentages();
      } else {
        let val = input.value.trim();
        if (val === "") {
          input.value = "";
        } else {
          let num = parseFloat(val);
          if (isNaN(num)) input.value = "";
          else {
            if (num < 0) num = 0;
            if (num > 100) num = 100;
            input.value = num;
          }
        }
        updateAll();
      }
    }

    function handleAmountChange(input) {
      const row = input.closest('.recipient-row');
      const total = getTotalAmount();
      if (total <= 0) return;

      let val = input.value.trim();
      if (val === "") {
        input.value = "";
        updateAll();
        return;
      }

      let currentAmount = parseFloat(val) || 0;
      let currentPerc = (currentAmount / total) * 100;
      
      if (currentPerc > 100) currentPerc = 100;
      row.querySelector('.percent').value = currentPerc;

      if (splitMode === 'auto') autoDistributePercentages();
      else updateAll();
    }

    function validateAddress(input) {
      const isValid = !input.value || ethers.isAddress(input.value.trim());
      input.classList.toggle("invalid", !isValid);
    }

    function updatePercentTotal() {
      const percents = Array.from(document.querySelectorAll('.percent')).map(el => parseFloat(el.value) || 0);
      const total = percents.reduce((a, b) => a + b, 0);
      const el = document.getElementById("percent-total");
      el.textContent = `Total: ${total.toFixed(6)}%`;
      el.style.color = total > 99.99 ? '#00ffaa' : (total > 100 ? '#ff3366' : 'white');
    }

    function updatePreview() {
      const tbody = document.getElementById("preview-body");
      tbody.innerHTML = "";
      const totalAmount = getTotalAmount();

      document.querySelectorAll('.recipient-row').forEach(row => {
        const addr = row.querySelector('.address').value.trim();
        const perc = parseFloat(row.querySelector('.percent').value) || 0;
        const amount = parseFloat(row.querySelector('.amount').value) || 0;

        if (addr) {
          const tr = document.createElement("tr");
          tr.className = "border-b border-white/10 last:border-none";
          tr.innerHTML = `
            <td class="p-4 font-mono text-xs">${addr.substring(0,12)}...</td>
            <td class="text-right p-4">${perc.toFixed(6)}%</td>
            <td class="text-right p-4 font-medium">${amount.toFixed(6)}</td>
          `;
          tbody.appendChild(tr);
        }
      });
    }

    function distributeRemaining() {
      const percents = Array.from(document.querySelectorAll('.percent'));
      if (percents.length === 0) return;

      let total = percents.reduce((sum, el) => sum + (parseFloat(el.value) || 0), 0);
      let remaining = 100 - total;

      if (remaining <= 0.000001) {
        showToast("Percentage is already 100%");
        return;
      }

      percents[percents.length - 1].value = remaining.toFixed(6);
      updateAll();
    }

    async function sendSplit() {
      if (!signer) return showToast("Please connect your wallet first!");
      if (isProcessing) return;

      const rows = document.querySelectorAll('.recipient-row');
      if (rows.length < 2) return showToast("At least 2 recipients are required");

      const addresses = [];
      const percentages = [];
      let totalPerc = 0;

      rows.forEach(row => {
        const addr = row.querySelector('.address').value.trim();
        const perc = parseFloat(row.querySelector('.percent').value) || 0;
        if (addr && perc > 0) {
          addresses.push(addr);
          percentages.push(Math.round(perc * 100));
          totalPerc += perc;
        }
      });

      if (addresses.length < 2) return showToast("At least 2 valid recipients needed");

      if (totalPerc > 100) {
        return showToast("Total percentage cannot be more than 100%", 5000);
      }

      if (Math.abs(totalPerc - 100) > 0.01) {
        if (!confirm(`Total percentage is ${totalPerc.toFixed(4)}% (not 100%).\nDo you want to continue?`)) return;
      }

      if (percentages.length > 0) {
        let sum = percentages.reduce((a, b) => a + b, 0);
        percentages[percentages.length - 1] += (10000 - sum);
      }

      for (let addr of addresses) {
        if (!ethers.isAddress(addr)) return showToast(`Invalid address: ${addr}`);
      }

      const totalAmountStr = document.getElementById("totalAmount").value;
      const totalAmount = parseFloat(totalAmountStr);
      if (!totalAmount || totalAmount <= 0) return showToast("Enter a valid amount!");

      if (!confirm(`Send ${totalAmount} tokens to ${addresses.length} recipients?`)) return;

      isProcessing = true;
      const btn = document.getElementById("sendBtn");
      btn.disabled = true;
      btn.textContent = "Processing...";

      try {
        const tokenAddr = document.getElementById("tokenSelect").value;
        const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;

        const tokenContract = new ethers.Contract(tokenAddr, [
          "function approve(address,uint256) returns (bool)",
          "function decimals() view returns (uint8)"
        ], signer);

        const decimals = await tokenContract.decimals();
        const totalWei = ethers.parseUnits(totalAmountStr, decimals);

        await (await tokenContract.approve(CONTRACT_ADDRESS, totalWei)).wait();

        const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
        const tx = await contract.splitPayment(tokenAddr, addresses, percentages, totalWei, { gasLimit: 800000 });
        await tx.wait();

        document.getElementById("successMessage").innerHTML = ` Transaction Successful!<br>
          <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" class="underline font-medium">
            View on Explorer: ${tx.hash.substring(0,12)}...
          </a>`;
        document.getElementById("successMessage").classList.remove('hidden');

        transactions.unshift({
          hash: tx.hash,
          intent: `${totalAmount} ${symbol} → ${addresses.length} recipients`,
          time: new Date().toLocaleString()
        });
        localStorage.setItem('arcTxHistory', JSON.stringify(transactions));
        renderHistory();
        await updateBalance();
        showToast("Transaction sent successfully!");

      } catch (error) {
        console.error(error);
        showToast(error.reason || error.message || "Transaction failed");
      } finally {
        isProcessing = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("sendBtn").textContent = "Send Split Transaction";
      }
    }

    function renderHistory() {
      const container = document.getElementById("history");
      container.innerHTML = transactions.length ? "" : "<p class='text-gray-400 text-center py-8'>No transactions yet.</p>";
      transactions.slice(0, 5).forEach(tx => {
        const div = document.createElement("div");
        div.className = "glass border border-white/10 rounded-2xl p-4 text-sm";
        div.innerHTML = `
          <div class="text-gray-400 text-xs">${tx.time}</div>
          <div>${tx.intent}</div>
          <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" class="text-emerald-400 text-xs hover:underline">View Tx →</a>
        `;
        container.appendChild(div);
      });
    }
