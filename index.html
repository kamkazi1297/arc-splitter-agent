<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f0f23, #1a1a2e); color: white; text-align: center; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.06); padding: 35px; border-radius: 20px; }
    button { padding: 14px 30px; margin: 10px; font-size: 17px; border-radius: 12px; cursor: pointer; }
    .connect-btn { background: #00ff9d; color: black; }
    .tg-btn { background: #229ED9; color: white; }
    .send-btn { background: #ff2d55; color: white; }
    input, textarea { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #1e1e2e; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>
    <p><strong>Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">🔗 Connect MetaMask</button>
    <button class="tg-btn" onclick="connectTelegram()">📱 Connect Telegram</button>
    
    <p id="status"></p>

    <h3>Enter Split Intent</h3>
    <textarea id="intent" placeholder="Send 50 USDC, 40% to 0x123..., 60% to 0x456..."></textarea><br>
    
    <button class="send-btn" onclick="sendSplit()">🚀 Send Split Transaction</button>
  </div>

  <script>
    let signer = null;
    let userAddress = null;

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();
      document.getElementById("status").innerHTML = `✅ Wallet Connected: ${userAddress.substring(0,8)}...`;
    }

    function connectTelegram() {
      if (!userAddress) {
        alert("First connect MetaMask!");
        return;
      }
      const tgUsername = prompt("Enter your Telegram Username (without @):");
      if (tgUsername) {
        document.getElementById("status").innerHTML += `<br>📨 Connection request sent to @${tgUsername}<br>Please confirm in the bot.`;
        alert(`Request sent to @${tgUsername}\n\nGo to bot and confirm the connection.`);
      }
    }

    async function sendSplit() {
      if (!signer) return alert("Please connect MetaMask first!");
      alert("Split transaction feature is active.");
    }
  </script>
</body>
</html>
