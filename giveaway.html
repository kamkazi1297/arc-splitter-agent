<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Giveaway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .glass { 
      background: rgba(255,255,255,0.08); 
      backdrop-filter: blur(20px); 
      border: 1px solid rgba(255,255,255,0.1); 
    }
    .light .glass { 
      background: rgba(255,255,255,0.88); 
      border-color: rgba(0,0,0,0.12); 
    }
    .light body, .light h1, .light label { color: #1f2937; }

    select, input, textarea {
      background-color: rgba(255,255,255,0.05); 
      color: white; 
      border: 1px solid rgba(255,255,255,0.25);
    }
    .light select, .light input, .light textarea {
      background-color: #f8fafc; 
      color: #1f2937; 
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-4xl font-bold">ArcSplit Giveaway</h1>
      <div class="flex gap-3">
        <button onclick="toggleTheme()" id="themeBtn" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">
          <i class="fas fa-moon text-xl"></i>
        </button>
        <button onclick="connectWallet()" id="connectBtn" class="px-6 py-3 bg-white text-black font-semibold rounded-2xl flex items-center gap-2">
          <i class="fas fa-wallet"></i> 
          <span id="connectText">Connect Wallet</span>
        </button>
      </div>
    </div>

    <div id="status" class="glass border border-white/10 rounded-3xl p-6 mb-8 text-base font-medium">
      Ready for Giveaway on Arc Testnet
    </div>

    <div id="successMessage" class="hidden glass border border-emerald-500/30 bg-emerald-500/10 rounded-3xl p-6 mb-8 text-emerald-400"></div>

    <div class="glass border border-white/10 rounded-3xl p-8">
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-gray-400 text-sm mb-2">Select Token</label>
          <select id="tokenSelect" class="w-full rounded-2xl px-6 py-5 outline-none">
            <option value="0x3600000000000000000000000000000000000000">USDC</option>
            <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
            <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Total Amount</label>
          <input type="number" id="totalAmount" value="100" step="0.000001" class="w-full rounded-2xl px-6 py-5 text-2xl outline-none">
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Number of Winners</label>
        <input type="number" id="winnerCount" value="10" min="1" max="300" class="w-full rounded-2xl px-6 py-5 text-2xl outline-none">
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Description (Optional)</label>
        <textarea id="description" rows="2" class="w-full rounded-2xl px-6 py-5 outline-none" placeholder="Giveaway description..."></textarea>
      </div>

      <div class="flex gap-3 mb-8">
        <button onclick="generateTweetText()" class="flex-1 py-4 bg-[#1DA1F2] rounded-2xl font-medium hover:brightness-110 transition">
          📋 Twitter Text
        </button>
        <button onclick="selectRandomWinners()" class="flex-1 py-4 bg-purple-600 rounded-2xl font-medium hover:brightness-110 transition">
          🎲 Random Select
        </button>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-3">Winner Addresses <span class="text-xs">(one per line)</span></label>
        <textarea id="winnersList" rows="8" class="w-full rounded-2xl px-6 py-5 font-mono text-sm outline-none" placeholder="0x123...&#10;0x456..."></textarea>
      </div>

      <button id="sendBtn" onclick="sendGiveawaySplit()" 
              class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-7 rounded-3xl text-xl font-bold hover:brightness-110 transition-all">
        Send Equal Split to Winners
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 border border-white/20 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-50">
    <span id="toastText"></span>
  </div>

<script>
const CONTRACT_ADDRESS = "0x73Da94F0D960Ef8FD49Ed28a94f667aF3C062cB2";
const ARC_CHAIN_ID = 5042002;

let signer = null;
let userAddress = null;
let isProcessing = false;

const splitterAbi = [
  {
    "inputs": [
      {"name": "token", "type": "address"},
      {"name": "recipients", "type": "address[]"},
      {"name": "percentages", "type": "uint256[]"},
      {"name": "totalAmount", "type": "uint256"}
    ],
    "name": "splitPayment",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  }
];

function showToast(msg, duration = 5000) {
  const toast = document.getElementById("toast");
  document.getElementById("toastText").innerHTML = msg;
  toast.classList.remove("hidden");
  setTimeout(() => toast.classList.add("hidden"), duration);
}

function toggleTheme() {
  document.documentElement.classList.toggle('light');
  const icon = document.getElementById("themeBtn").querySelector("i");
  icon.classList.toggle("fa-moon");
  icon.classList.toggle("fa-sun");
}

async function connectWallet() {
  if (!window.ethereum) return showToast("MetaMask not found!", 4000);

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    const network = await provider.getNetwork();
    
    if (network.chainId !== BigInt(ARC_CHAIN_ID)) {
      return showToast("Please switch to <b>Arc Testnet</b> (Chain ID: 5042002)", 6000);
    }

    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddress = accounts[0];
    signer = await provider.getSigner();

    document.getElementById("connectText").textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
    showToast("Wallet connected successfully");
  } catch (e) {
    showToast("Connection failed");
  }
}

function generateTweetText() {
  const amount = document.getElementById("totalAmount").value;
  const token = document.getElementById("tokenSelect").selectedOptions[0].text;
  const count = document.getElementById("winnerCount").value;
  const text = `🎁 GIVEAWAY!\n\n${amount} ${token} to ${count} lucky winners!\n\nComment your wallet 👇`;
  
  navigator.clipboard.writeText(text);
  showToast("✅ Twitter text copied to clipboard!");
}

function selectRandomWinners() {
  const text = document.getElementById("winnersList").value.trim();
  if (!text) return showToast("Enter addresses first!");
  
  let addresses = text.split("\n").map(a => a.trim()).filter(a => a);
  const count = parseInt(document.getElementById("winnerCount").value) || 10;
  
  if (addresses.length < count) return showToast("Not enough addresses!");
  
  const shuffled = addresses.sort(() => 0.5 - Math.random());
  document.getElementById("winnersList").value = shuffled.slice(0, count).join("\n");
  
  showToast(`Selected ${count} random winners`);
}

async function sendGiveawaySplit() {
  if (!signer) return showToast("Please connect your wallet first!");
  if (isProcessing) return;

  const listText = document.getElementById("winnersList").value.trim();
  if (!listText) return showToast("No addresses entered!");

  let addresses = listText.split("\n")
    .map(a => a.trim())
    .filter(a => ethers.isAddress(a));

  if (addresses.length === 0) return showToast("No valid addresses!");
  if (addresses.length > 300) return showToast("Maximum 300 winners allowed");

  const totalAmount = parseFloat(document.getElementById("totalAmount").value);
  if (!totalAmount || totalAmount <= 0) return showToast("Enter a valid total amount!");

  const tokenAddr = document.getElementById("tokenSelect").value;
  const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;

  if (!confirm(`Send ${totalAmount} ${symbol} equally to ${addresses.length} winners?`)) return;

  isProcessing = true;
  const btn = document.getElementById("sendBtn");
  btn.disabled = true;
  btn.textContent = "Processing...";

  try {
    const tokenContract = new ethers.Contract(tokenAddr, [
      "function approve(address,uint256) returns (bool)",
      "function decimals() view returns (uint8)"
    ], signer);

    const decimals = await tokenContract.decimals();
    const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);

    // Approve
    const txApprove = await tokenContract.approve(CONTRACT_ADDRESS, totalWei);
    await txApprove.wait();

    const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
    
    // تقسیم مساوی درست
    const count = addresses.length;
    let basisPoints = new Array(count).fill(Math.floor(10000 / count));
    const sum = basisPoints.reduce((a, b) => a + b, 0);
    basisPoints[basisPoints.length - 1] += (10000 - sum);

    const tx = await contract.splitPayment(
      tokenAddr, 
      addresses, 
      basisPoints, 
      totalWei, 
      { gasLimit: 800000 }
    );
    
    await tx.wait();

    document.getElementById("successMessage").innerHTML = `
      ✅ Giveaway Sent Successfully!<br>
      <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" class="underline font-medium">
        View Transaction → ${tx.hash.substring(0,12)}...
      </a>`;
    document.getElementById("successMessage").classList.remove('hidden');

    showToast("🎉 Giveaway transaction completed!");

  } catch (error) {
    console.error(error);
    showToast(error.reason || error.message || "Transaction failed", 6000);
  } finally {
    isProcessing = false;
    btn.disabled = false;
    btn.textContent = "Send Equal Split to Winners";
  }
}

// Auto load
window.addEventListener('load', () => {
  // Add initial example addresses if empty
  setTimeout(() => {
    const winnersList = document.getElementById("winnersList");
    if (!winnersList.value.trim()) {
      winnersList.value = "0x742d35Cc6634C0532925a3b844Bc454e4438f44e\n0x8c5f8c2e5c2b5f5e5f5e5f5e5f5e5f5e5f5e5f5e";
    }
  }, 800);
});
</script>
</body>
</html>
