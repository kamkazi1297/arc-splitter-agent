<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Pro - Token Splitter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
    }
    
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
    }
    .light .glass {
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.12);
    }

    .light body, .light h1, .light h3, .light label, .light .text-white {
      color: #1f2937;
    }
    .light .text-gray-400 { color: #64748b; }

    select, input {
      background-color: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .light select, .light input {
      background-color: #f8fafc;
      color: #1f2937;
      border: 1px solid #e2e8f0;
    }

    select option {
      background-color: #1a1a2e;
      color: white;
      padding: 12px 16px;
    }
    .light select option {
      background-color: #f8fafc;
      color: #1f2937;
    }

    .invalid {
      border-color: #ef4444 !important;
      animation: shake 0.3s;
    }

    .percent-container, .amount-container {
      position: relative;
    }
    .percent-container::after {
      content: "%";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-weight: 600;
      pointer-events: none;
    }
    .light .percent-container::after {
      color: #64748b;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .preview-scroll {
      max-height: 320px;
      overflow-y: auto;
    }

    #logoContainer {
      position: relative;
    }

    #glowRing {
      position: absolute;
      inset: -10px;
      background: linear-gradient(45deg, #10b981, #22d3ee, #10b981);
      border-radius: 2rem;
      opacity: 0.25;
      filter: blur(8px);
      z-index: -1;
      animation: rotateGlow 10s linear infinite;
      transition: all 0.8s ease;
    }

    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #logoContainer.connected #glowRing {
      animation: none;
      opacity: 0.45;
      filter: blur(10px);
      box-shadow: 0 0 25px -2px rgb(16 185 129 / 0.6);
    }

    @media (max-width: 640px) {
      .max-w-2xl { max-width: 100% !important; padding-left: 8px; padding-right: 8px; }
      .recipient-row { flex-direction: column; gap: 14px; padding: 18px !important; }
      input[type="text"], input[type="number"] {
        font-size: 1.05rem !important;
        padding: 16px 14px !important;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <div id="logoContainer" class="relative">
          <div id="glowRing"></div>
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" class="relative z-10 drop-shadow-2xl">
            <circle cx="26" cy="26" r="23" stroke="url(#grad1)" stroke-width="3" stroke-opacity="0.6"/>
            <circle cx="26" cy="26" r="20" fill="#0f172a"/>
            <text x="26" y="37" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="url(#grad2)" text-anchor="middle" dominant-baseline="middle">A</text>
            <line x1="18" y1="32" x2="34" y2="32" stroke="#67e8f9" stroke-width="2.5" stroke-opacity="0.9"/>
            <defs>
              <linearGradient id="grad1" x1="10" y1="10" x2="42" y2="42" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#10b981"/>
                <stop offset="100%" stop-color="#22d3ee"/>
              </linearGradient>
              <linearGradient id="grad2" x1="15" y1="15" x2="38" y2="38" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#67e8f9"/>
                <stop offset="100%" stop-color="#34d399"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

        <div>
          <h1 class="text-4xl font-bold">ArcSplit Pro</h1>
          <p class="text-gray-400">Professional Token Splitter</p>
        </div>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 mb-8">
      <button onclick="toggleTheme()" id="themeBtn" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all flex-shrink-0">
        <i class="fas fa-moon text-xl"></i>
      </button>

      <div class="flex flex-1 gap-3">
        <button onclick="showConnectModal()" id="connectBtn" class="flex-1 px-6 py-3.5 bg-white text-black font-semibold rounded-2xl flex items-center justify-center gap-2 hover:bg-gray-100 transition-all">
          <i class="fas fa-wallet"></i> 
          <span id="connectText">Connect Wallet</span>
        </button>

        <button onclick="connectTelegram()" id="telegramBtn" class="flex-1 px-6 py-3.5 bg-[#229ED9] hover:bg-[#1a8ac4] text-white font-semibold rounded-2xl flex items-center justify-center gap-2 transition-all">
          <i class="fab fa-telegram-plane"></i> 
          <span id="telegramText">Connect Telegram</span>
        </button>
      </div>
    </div>

    <div id="status" class="glass border border-white/10 rounded-3xl p-6 mb-8 text-base font-medium">Ready to split tokens on Arc Testnet.</div>
    <div id="successMessage" class="hidden glass border border-emerald-500/30 bg-emerald-500/10 rounded-3xl p-6 mb-8 text-emerald-400"></div>

    <div class="glass border border-white/10 rounded-3xl p-8 mb-8">
      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Select Token</label>
        <select id="tokenSelect" onchange="handleTokenChange()" class="w-full rounded-2xl px-6 py-5 focus:border-emerald-500 outline-none text-base">
          <option value="0x3600000000000000000000000000000000000000">USDC</option>
          <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
          <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
          <option value="custom">Add Custom Token...</option>
        </select>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Total Amount</label>
        <div class="flex gap-3">
          <input type="number" id="totalAmount" value="100" step="0.000001" class="flex-1 bg-white/5 border border-white/20 rounded-2xl px-6 py-5 text-3xl outline-none" oninput="updateAll()">
          <button onclick="setMaxAmount()" class="px-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">MAX</button>
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-3">Quick Templates</label>
        <div class="grid grid-cols-4 gap-3">
          <button onclick="loadTemplate(1)" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">50-50</button>
          <button onclick="loadTemplate(2)" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">33-33-34</button>
          <button onclick="loadTemplate(3)" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">40-60</button>
          <button onclick="equalSplit()" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">Equal Split</button>
        </div>
      </div>

      <div class="mb-6">
        <div class="flex justify-between mb-4">
          <h3 class="font-semibold">Recipients</h3>
          <div class="flex gap-3 items-center">
            <div class="flex bg-white/10 rounded-2xl p-1 text-sm">
              <button onclick="setMode('manual')" id="manualBtn" class="mode-btn px-5 py-2 rounded-xl font-medium transition-all">Manual</button>
              <button onclick="setMode('auto')" id="autoBtn" class="mode-btn px-5 py-2 rounded-xl font-medium transition-all">Auto</button>
            </div>
            <button onclick="showImportModal()" class="text-sky-400 hover:text-sky-300 flex items-center gap-1 text-sm">
              <i class="fas fa-upload"></i> Import
            </button>
            <button onclick="addRecipient()" class="text-emerald-400 hover:text-emerald-300 flex items-center gap-1">
              <i class="fas fa-plus"></i> Add
            </button>
          </div>
        </div>
        <div id="recipients-list" class="space-y-4"></div>
      </div>

      <div class="mb-8">
        <h4 class="text-gray-400 text-sm mb-3">Split Preview</h4>
        <div class="glass rounded-2xl overflow-hidden">
          <div class="preview-scroll">
            <table class="w-full">
              <thead>
                <tr class="border-b border-white/10 sticky top-0 bg-[#1a1a2e]">
                  <th class="text-left p-4 text-gray-400">Recipient</th>
                  <th class="text-right p-4 text-gray-400">Percent</th>
                  <th class="text-right p-4 text-gray-400">Amount</th>
                </tr>
              </thead>
              <tbody id="preview-body" class="text-sm"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="flex justify-between mb-8">
        <span id="percent-total" class="font-bold text-lg">Total: 0%</span>
        <button onclick="distributeRemaining()" class="text-amber-400 hover:text-amber-300">Distribute Remaining</button>
      </div>

      <button id="sendBtn" onclick="sendSplit()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-7 rounded-3xl text-xl font-bold">
        Send Split Transaction
      </button>
    </div>

    <div class="glass border border-white/10 rounded-3xl p-8">
      <h3 class="font-semibold mb-4">Recent Transactions</h3>
      <div id="history" class="space-y-3 max-h-80 overflow-auto"></div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="importModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-8 max-w-md w-full mx-4">
      <h3 class="text-xl font-bold mb-4">Import Recipients</h3>
      <textarea id="importText" rows="8" class="w-full bg-white/5 border border-white/20 rounded-2xl p-5 text-sm font-mono" placeholder="0x1234567890abcdef1234567890abcdef12345678,50"></textarea>
      <p class="text-xs text-gray-400 mt-2">Format: address,percent (one per line)</p>
      <div class="flex gap-3 mt-6">
        <button onclick="hideImportModal()" class="flex-1 py-4 rounded-2xl border border-white/20 hover:bg-white/10">Cancel</button>
        <button onclick="importRecipients()" class="flex-1 py-4 bg-emerald-500 hover:bg-emerald-600 rounded-2xl">Import</button>
      </div>
    </div>
  </div>

  <!-- Wallet Connect Modal -->
  <div id="connectModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass border border-white/10 rounded-3xl p-8 max-w-md w-full mx-4">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">Connect Wallet</h3>
        <button onclick="hideConnectModal()" class="text-gray-400 hover:text-white text-3xl leading-none">×</button>
      </div>
      <div class="space-y-3">
        <button onclick="connectMetaMask()" class="w-full flex items-center gap-4 p-5 rounded-2xl hover:bg-white/10 transition-all group">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" width="40" height="40" alt="MetaMask">
          <div class="text-left">
            <div class="font-semibold text-lg">MetaMask</div>
            <div class="text-sm text-gray-400">Popular browser wallet</div>
          </div>
        </button>
        <button onclick="connectWalletConnect()" class="w-full flex items-center gap-4 p-5 rounded-2xl hover:bg-white/10 transition-all group">
          <img src="https://walletconnect.com/_next/static/media/walletconnect.2f8f1b5a.svg" width="40" height="40" alt="WalletConnect">
          <div class="text-left">
            <div class="font-semibold text-lg">WalletConnect</div>
            <div class="text-sm text-gray-400">Connect with mobile wallets</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 border border-white/20 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-50">
    <span id="toastText"></span>
  </div>

<script>
 let signer = null;
let userAddress = null;
let provider = null;
let transactions = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
let isProcessing = false;
let splitMode = 'manual';

let telegramLinked = false;
let telegramUsername = "";

  const CONTRACT_ADDRESS = "0x73Da94F0D960Ef8FD49Ed28a94f667aF3C062cB2";
  const ARC_CHAIN_ID = 5042002;

  const splitterAbi = [
    {
      "inputs": [
        { "name": "token", "type": "address" },
        { "name": "recipients", "type": "address[]" },
        { "name": "percentages", "type": "uint256[]" },
        { "name": "totalAmount", "type": "uint256" }
      ],
      "name": "splitPayment",
      "outputs": [],
      "stateMutability": "nonpayable",
      "type": "function"
    }
  ];

  function loadSavedConnections() {
    const savedWallet = localStorage.getItem('userAddress');
    const savedTelegram = localStorage.getItem('telegramUsername');
    if (savedWallet) {
      userAddress = savedWallet;
      updateConnectButton();
    }
    if (savedTelegram) {
      telegramLinked = true;
      telegramUsername = savedTelegram;
      updateTelegramButton();
    }
  }

  function updateConnectButton() {
    const btn = document.getElementById("connectBtn");
    const short = userAddress ? `${userAddress.slice(0,6)}...${userAddress.slice(-4)}` : "Connect Wallet";
    btn.innerHTML = `<i class="fas fa-wallet"></i> <span>${short}</span>`;
    btn.onclick = userAddress ? disconnectWallet : showConnectModal;
    if (userAddress) btn.classList.add("!bg-emerald-500", "!text-white");
  }

  function updateTelegramButton() {
  const btn = document.getElementById("telegramBtn");
  if (!btn) return;

  if (telegramLinked && telegramUsername) {
    btn.innerHTML = `
      <i class="fab fa-telegram-plane"></i> 
      <span>✅ ${telegramUsername}</span>
    `;
    btn.style.backgroundColor = "#0f9d58";
    btn.onclick = disconnectTelegram;
  } else {
    btn.innerHTML = `
      <i class="fab fa-telegram-plane"></i> 
      <span>Connect Telegram</span>
    `;
    btn.style.backgroundColor = "#229ED9";
    btn.onclick = connectTelegram;
  }
}

  function disconnectTelegram() {
  if (confirm("Disconnect Telegram account?")) {
    telegramLinked = false;
    telegramUsername = "";
    localStorage.removeItem('telegramLinked');
    localStorage.removeItem('telegramUsername');
    updateTelegramButton();
    showToast("Telegram disconnected");
  }
}

  async function restoreWalletConnection() {
  if (!window.ethereum || !userAddress) return;

  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    
    // چک کردن اینکه آدرس درست است
    const currentAddress = await signer.getAddress();
    if (currentAddress.toLowerCase() === userAddress.toLowerCase()) {
      console.log("Wallet restored successfully");
      await updateBalance();   // بالانس رو لود کن
    }
  } catch (e) {
    console.log("Could not auto-restore signer, user needs to reconnect manually");
  }
}

  function connectTelegram() {
  if (!userAddress) {
    return showToast("Please connect your wallet first!");
  }

  const botUsername = "ArcSplitPro_bot";
  const timestamp = Date.now(); // جلوگیری از cache
  const link = `https://t.me/${botUsername}?start=wallet_${userAddress}_${timestamp}`;
  
  window.open(link, "_blank");
  showToast("Opening Telegram to connect...");
}

  function showToast(msg, duration = 5000) {
    const toast = document.getElementById("toast");
    document.getElementById("toastText").innerHTML = msg;
    toast.classList.remove("hidden");
    setTimeout(() => toast.classList.add("hidden"), duration);
  }

  function toggleTheme() {
    document.documentElement.classList.toggle('light');
    const icon = document.getElementById("themeBtn").querySelector("i");
    if (icon.classList.contains("fa-moon")) {
      icon.classList.remove("fa-moon");
      icon.classList.add("fa-sun");
    } else {
      icon.classList.remove("fa-sun");
      icon.classList.add("fa-moon");
    }
  }

  function showConnectModal() {
    document.getElementById("connectModal").classList.remove("hidden");
  }

  function hideConnectModal() {
    document.getElementById("connectModal").classList.add("hidden");
  }

  async function connectMetaMask() {
  hideConnectModal();
  if (!window.ethereum) return showToast("MetaMask not found!");

  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    const network = await provider.getNetwork();
    
    if (network.chainId !== BigInt(ARC_CHAIN_ID)) {
      showToast("Please switch to <b>Arc Testnet</b> (Chain ID: 5042002)", 6000);
      return;
    }

    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddress = accounts[0];

    // ذخیره والت برای بعد از رفرش
    localStorage.setItem('userAddress', userAddress);

    signer = await provider.getSigner();

    document.getElementById("logoContainer").classList.add("connected");
    updateConnectButton();
    showToast("Wallet connected successfully");
    await updateBalance();

  } catch (e) {
    console.error(e);
    showToast("Failed to connect wallet");
  }
}

  function disconnectWallet() {
    signer = null; userAddress = null; provider = null;
    document.getElementById("logoContainer").classList.remove("connected");
    const btn = document.getElementById("connectBtn");
    btn.innerHTML = `<i class="fas fa-wallet"></i> <span>Connect Wallet</span>`;
    btn.onclick = showConnectModal;
    btn.classList.remove("!bg-emerald-500", "!text-white");
    localStorage.removeItem('userAddress');
    showToast("Wallet disconnected");
  }

  function getTotalAmount() {
    return parseFloat(document.getElementById("totalAmount").value) || 0;
  }

  function formatAmount(num) {
    if (num === 0 || isNaN(num)) return "";
    let str = num.toFixed(6);
    str = str.replace(/\.?0+$/, "");
    return str;
  }

  function updateAll() {
    updateRecipientsAmounts();
    updatePercentTotal();
    updatePreview();
  }

  function updateRecipientsAmounts() {
    const total = getTotalAmount();
    document.querySelectorAll('.recipient-row').forEach(row => {
      const perc = parseFloat(row.querySelector('.percent').value) || 0;
      const amount = total * perc / 100;
      row.querySelector('.amount').value = formatAmount(amount);
    });
  }

  function setMode(mode) {
    splitMode = mode;
    document.getElementById('manualBtn').classList.toggle('bg-white/20', mode === 'manual');
    document.getElementById('autoBtn').classList.toggle('bg-white/20', mode === 'auto');
    if (mode === 'auto') autoDistributePercentages();
  }

  function addRecipient(address = "", percent = "") {
    const list = document.getElementById("recipients-list");
    const row = document.createElement("div");
    row.className = "recipient-row glass border border-white/10 rounded-2xl p-5 flex items-center gap-4";
    row.innerHTML = `
      <input type="text" class="address flex-1 bg-transparent border border-white/20 rounded-xl px-5 py-4 text-white placeholder-gray-400" placeholder="0x..." value="${address}" oninput="validateAddress(this); updateAll()">
      <div class="percent-container w-28">
        <input type="text" class="percent w-full bg-transparent border border-white/20 rounded-xl px-5 py-4 text-center text-white" value="${percent}" oninput="handlePercentChange(this); updateAll()">
      </div>
      <div class="amount-container w-36">
        <input type="text" class="amount w-full bg-transparent border border-white/20 rounded-xl px-5 py-4 text-center text-white" oninput="handleAmountChange(this); updateAll()">
      </div>
      <button onclick="this.parentElement.remove(); updateAll(); if(splitMode==='auto') autoDistributePercentages();" class="text-rose-400 text-3xl px-3">×</button>
    `;
    list.appendChild(row);
    if (splitMode === 'auto') autoDistributePercentages();
    else updateAll();
  }

  function autoDistributePercentages() {
    const rows = document.querySelectorAll('.recipient-row');
    if (rows.length === 0) return;
    const totalBasis = 10000;
    const base = Math.floor(totalBasis / rows.length);
    let total = 0;
    rows.forEach((row, index) => {
      const percentInput = row.querySelector('.percent');
      let value = base;
      if (index === rows.length - 1) value = totalBasis - total;
      percentInput.value = (value / 100).toFixed(6);
      total += value;
    });
    updateAll();
  }

  function handlePercentChange(input) {
    if (splitMode === 'auto') autoDistributePercentages();
    else {
      let val = input.value.trim();
      if (val === "") { input.value = ""; updateAll(); return; }
      let num = parseFloat(val);
      if (isNaN(num)) input.value = "";
      else {
        if (num < 0) num = 0;
        if (num > 100) num = 100;
        input.value = num;
      }
      updateAll();
    }
  }

  function handleAmountChange(input) {
    const row = input.closest('.recipient-row');
    const total = getTotalAmount();
    if (total <= 0) return;
    let val = input.value.trim();
    if (val === "") {
      input.value = "";
      row.querySelector('.percent').value = "";
      updateAll();
      return;
    }
    let currentAmount = parseFloat(val) || 0;
    let currentPerc = (currentAmount / total) * 100;
    if (currentPerc > 100) currentPerc = 100;
    row.querySelector('.percent').value = currentPerc.toFixed(6);
    updateAll();
  }

  function validateAddress(input) {
    const isValid = !input.value || ethers.isAddress(input.value.trim());
    input.classList.toggle("invalid", !isValid);
  }

  function updatePercentTotal() {
    const percents = Array.from(document.querySelectorAll('.percent')).map(el => parseFloat(el.value) || 0);
    const total = percents.reduce((a, b) => a + b, 0);
    const el = document.getElementById("percent-total");
    el.textContent = `Total: ${total.toFixed(6)}%`;
    el.style.color = total > 99.99 ? '#00ffaa' : (total > 100 ? '#ff3366' : 'white');
  }

  function updatePreview() {
    const tbody = document.getElementById("preview-body");
    tbody.innerHTML = "";
    const totalAmount = getTotalAmount();
    document.querySelectorAll('.recipient-row').forEach(row => {
      const addr = row.querySelector('.address').value.trim();
      const perc = parseFloat(row.querySelector('.percent').value) || 0;
      const amount = parseFloat(row.querySelector('.amount').value) || 0;
      if (addr) {
        const tr = document.createElement("tr");
        tr.className = "border-b border-white/10 last:border-none";
        tr.innerHTML = `
          <td class="p-4 font-mono text-xs">${addr.substring(0,12)}...</td>
          <td class="text-right p-4">${perc.toFixed(6)}%</td>
          <td class="text-right p-4 font-medium">${amount.toFixed(6)}</td>
        `;
        tbody.appendChild(tr);
      }
    });
  }

  function distributeRemaining() {
    const percents = Array.from(document.querySelectorAll('.percent'));
    if (percents.length === 0) return;
    let total = percents.reduce((sum, el) => sum + (parseFloat(el.value) || 0), 0);
    let remaining = 100 - total;
    if (remaining <= 0.000001) return showToast("Percentage is already 100%");
    percents[percents.length - 1].value = remaining.toFixed(6);
    updateAll();
  }

  function loadTemplate(type) {
    const list = document.getElementById("recipients-list");
    list.innerHTML = "";
    if (type === 1) { addRecipient("", 50); addRecipient("", 50); }
    else if (type === 2) { addRecipient("", ""); addRecipient("", ""); addRecipient("", ""); }
    else if (type === 3) { addRecipient("", 40); addRecipient("", 60); }
    setMode('manual');
  }

  function equalSplit() {
    const count = parseInt(prompt("Number of recipients (2-10):", "4")) || 4;
    if (count < 2 || count > 10) return showToast("Number must be between 2 and 10");
    const list = document.getElementById("recipients-list");
    list.innerHTML = "";
    for (let i = 0; i < count; i++) addRecipient("", "");
    setMode('auto');
  }

  function showImportModal() {
    document.getElementById("importModal").classList.remove("hidden");
  }

  function hideImportModal() {
    document.getElementById("importModal").classList.add("hidden");
  }

  function importRecipients() {
    const text = document.getElementById("importText").value.trim();
    if (!text) return hideImportModal();
    const lines = text.split("\n");
    const list = document.getElementById("recipients-list");
    list.innerHTML = "";
    lines.forEach(line => {
      const [addr, perc] = line.split(",").map(s => s.trim());
      if (addr && ethers.isAddress(addr)) addRecipient(addr, perc || "");
    });
    hideImportModal();
    showToast("Recipients imported successfully");
    setMode('manual');
  }

  async function updateBalance(retry = 0) {
    if (!signer || !userAddress) return;
    const statusEl = document.getElementById("status");
    statusEl.innerHTML = `Connected • Loading balance...`;
    try {
      const tokenAddr = document.getElementById("tokenSelect").value;
      if (tokenAddr === "custom") return;
      const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;
      const contract = new ethers.Contract(tokenAddr, [
        "function balanceOf(address) view returns (uint256)",
        "function decimals() view returns (uint8)"
      ], signer);
      const [balance, decimals] = await Promise.all([contract.balanceOf(userAddress), contract.decimals()]);
      const formatted = parseFloat(ethers.formatUnits(balance, decimals)).toFixed(4);
      statusEl.innerHTML = `Connected • Balance: <span class="text-emerald-400 font-semibold text-lg">${formatted} ${symbol}</span>`;
    } catch (e) {
      if (retry < 2) setTimeout(() => updateBalance(retry + 1), 1000);
      else statusEl.innerHTML = `Connected • <span class="text-amber-400">Balance unavailable</span>`;
    }
  }

  async function handleTokenChange() {
    const select = document.getElementById("tokenSelect");
    if (select.value === "custom") {
      const addr = prompt("Enter Custom Token Address (0x...):");
      if (addr && ethers.isAddress(addr)) {
        const option = document.createElement("option");
        option.value = addr;
        option.text = addr.substring(0, 10) + "...";
        select.appendChild(option);
        select.value = addr;
        await updateBalance();
      } else {
        select.value = "0x3600000000000000000000000000000000000000";
      }
    } else {
      await updateBalance();
    }
  }

  async function setMaxAmount() {
    if (!signer) return showToast("Connect wallet first!");
    try {
      const tokenAddr = document.getElementById("tokenSelect").value;
      const contract = new ethers.Contract(tokenAddr, [
        "function balanceOf(address) view returns (uint256)",
        "function decimals() view returns (uint8)"
      ], signer);
      const [balance, decimals] = await Promise.all([contract.balanceOf(userAddress), contract.decimals()]);
      document.getElementById("totalAmount").value = parseFloat(ethers.formatUnits(balance, decimals)).toFixed(6);
      updateAll();
    } catch (e) {
      showToast("Could not fetch balance");
    }
  }

  async function sendSplit() {
    if (!signer) return showToast("Please connect your wallet first!");
    if (isProcessing) return;

    const rows = document.querySelectorAll('.recipient-row');
    if (rows.length < 2) return showToast("At least 2 recipients are required");

    const addresses = [];
    const percentages = [];
    let totalPerc = 0;

    for (let row of rows) {
      const addr = row.querySelector('.address').value.trim();
      let perc = parseFloat(row.querySelector('.percent').value) || 0;
      let amount = parseFloat(row.querySelector('.amount').value) || 0;

      if (!addr || !ethers.isAddress(addr)) return showToast("Invalid address detected");
      if (perc <= 0 && amount <= 0) return showToast("Please enter amount or percentage for all recipients");

      addresses.push(addr);
      percentages.push(perc);
      totalPerc += perc;
    }

    if (addresses.length < 2) return showToast("At least 2 valid recipients needed");

    const totalAmount = parseFloat(document.getElementById("totalAmount").value);
    if (!totalAmount || totalAmount <= 0) return showToast("Enter a valid total amount!");

    const tolerance = 0.000001;

    // ==================== Validation Logic ====================
    if (splitMode === 'manual') {
      if (totalPerc > 100 + tolerance) {
        return showToast("⚠️ Total percentage is more than 100%! Transaction blocked.", 5000);
      }
      if (Math.abs(totalPerc - 100) > tolerance) {
        if (!confirm(`⚠️ Total percentage is not 100% (${totalPerc.toFixed(6)}%)\n\nDo you want to proceed anyway?`)) {
          return;
        }
      }
    } else {
      // Auto Mode - Always show warning if last field has any difference
      const lastPerc = percentages[percentages.length - 1];
      const ideal = 100 / rows.length;
      const difference = (lastPerc - ideal).toFixed(6);

      if (Math.abs(difference) > 0) {
        if (!confirm(`⚠️ Due to precise rounding, the last recipient has ${difference}% more than the others.\n\nDo you want to proceed?`)) {
          return;
        }
      }
    }
    // =========================================================

    if (!confirm(`Send ${totalAmount} tokens to ${addresses.length} recipients?`)) return;

    isProcessing = true;
    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    btn.textContent = "Processing...";

    const successDiv = document.getElementById("successMessage");

    try {
      const tokenAddr = document.getElementById("tokenSelect").value;
      const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;

      const tokenContract = new ethers.Contract(tokenAddr, [
        "function approve(address,uint256) returns (bool)",
        "function decimals() view returns (uint8)"
      ], signer);

      const decimals = await tokenContract.decimals();
      const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);

      await (await tokenContract.approve(CONTRACT_ADDRESS, totalWei)).wait();

      const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
      
      let basisPoints = percentages.map(p => Math.round(p * 100));
      let sum = basisPoints.reduce((a, b) => a + b, 0);
      basisPoints[basisPoints.length - 1] += (10000 - sum);

      const tx = await contract.splitPayment(tokenAddr, addresses, basisPoints, totalWei, { gasLimit: 800000 });
      await tx.wait();
            // === ارسال هش به تلگرام ===
      if (telegramLinked && telegramUsername) {
        try {
          await fetch('https://arcsplit-bot.vercel.app/send-tx', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              telegramUsername: telegramUsername,
              txHash: tx.hash,
              amount: totalAmount,
              token: symbol,
              recipientsCount: addresses.length
            })
          });
        } catch (e) {
          console.log("Could not send notification to Telegram");
        }
      }

      successDiv.innerHTML = ` Transaction Successful!<br><a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" class="underline font-medium">View on Explorer: ${tx.hash.substring(0,12)}...</a>`;
      successDiv.classList.remove('hidden');

      transactions.unshift({
        hash: tx.hash,
        intent: `${totalAmount} ${symbol} → ${addresses.length} recipients`,
        time: new Date().toLocaleString()
      });
      localStorage.setItem('arcTxHistory', JSON.stringify(transactions));
      renderHistory();
      await updateBalance();
      showToast("Transaction sent successfully!");

    } catch (error) {
      console.error(error);
      showToast(error.reason || error.message || "Transaction failed");
    } finally {
      isProcessing = false;
      btn.disabled = false;
      btn.textContent = "Send Split Transaction";
    }
  }

  function renderHistory() {
    const container = document.getElementById("history");
    container.innerHTML = transactions.length ? "" : "<p class='text-gray-400 text-center py-8'>No transactions yet.</p>";
    transactions.slice(0, 5).forEach(tx => {
      const div = document.createElement("div");
      div.className = "glass border border-white/10 rounded-2xl p-4 text-sm";
      div.innerHTML = `
        <div class="text-gray-400 text-xs">${tx.time}</div>
        <div>${tx.intent}</div>
        <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" class="text-emerald-400 text-xs hover:underline">View Tx →</a>
      `;
      container.appendChild(div);
    });
  }

  // Auto-fill form when coming from Telegram Bot
function autoFillFromURL() {
  const urlParams = new URLSearchParams(window.location.search);
  
  const action = urlParams.get('action');
  const amount = urlParams.get('amount');
  const tokenSymbol = urlParams.get('token');
  const addressesStr = urlParams.get('addresses');
  const usernameParam = urlParams.get('username');

  // === Telegram Connection Detection ===
  if (window.location.search.includes('wallet_') || action === 'connect') {
    telegramLinked = true;
    
    if (usernameParam) {
      telegramUsername = usernameParam;
    } else if (!telegramUsername) {
      telegramUsername = "@Connected";
    }

    localStorage.setItem('telegramLinked', 'true');
    localStorage.setItem('telegramUsername', telegramUsername);
    updateTelegramButton();
    
    showToast("✅ Telegram connected successfully!", 4000);
  }

  // === Auto-fill form for send command ===
  if (action === 'send' && amount) {
    document.getElementById('totalAmount').value = amount;

    const tokenSelect = document.getElementById('tokenSelect');
    if (tokenSelect) {
      if (tokenSymbol === 'USDC') tokenSelect.value = "0x3600000000000000000000000000000000000000";
      else if (tokenSymbol === 'EURC') tokenSelect.value = "0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a";
      else if (tokenSymbol === 'cirBTC') tokenSelect.value = "0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF";
    }

    document.getElementById('recipients-list').innerHTML = '';

    let addresses = addressesStr ? addressesStr.split(',') : [];
    addresses.forEach(addr => {
      if (addr && addr.trim()) addRecipient(addr.trim(), "");
    });

    if (addresses.length === 1) {
      setTimeout(() => {
        const percents = document.querySelectorAll('.percent');
        if (percents.length > 0) percents[0].value = "100";
      }, 200);
    } else {
      setMode('auto');
    }

    setTimeout(() => {
      updateAll();
      showToast(`📱 Telegram command loaded! (${addresses.length} recipients)`, 5000);
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.style.background = 'linear-gradient(to right, #10b981, #34d399)';
      sendBtn.scrollIntoView({ behavior: "smooth" });
    }, 600);
  }
}
window.addEventListener('load', () => {
  // Restore Wallet Connection
  const savedAddress = localStorage.getItem('userAddress');
  if (savedAddress) {
    userAddress = savedAddress;
    updateConnectButton();
    document.getElementById("logoContainer").classList.add("connected");

    // تلاش برای بازیابی کامل اتصال (signer + provider)
    restoreWalletConnection();
  }

  // Restore Telegram
  telegramUsername = localStorage.getItem('telegramUsername') || "";
  telegramLinked = localStorage.getItem('telegramLinked') === 'true';
  if (telegramLinked) {
    updateTelegramButton();
  }

  addRecipient("", "");
  addRecipient("", "");
  setMode('manual');
  renderHistory();
  setTimeout(updateAll, 200);

  autoFillFromURL();
});
</script>
