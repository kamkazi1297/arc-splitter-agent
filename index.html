<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter - Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #0a0a1f, #1a1a35); 
      color: #e0e0ff; 
      margin: 0; padding: 20px; 
    }
    .container { 
      max-width: 780px; margin: 0 auto; 
      background: rgba(255,255,255,0.07); 
      padding: 40px; border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
    }
    h1 { color: #00ffaa; text-align: center; }
    input { 
      padding: 12px; margin: 6px 0; 
      border-radius: 12px; background: #151525; color: white; 
      border: 1px solid #00ffaa; font-size: 16px;
    }
    .recipient-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .recipient-row input.address { flex: 2; }
    .recipient-row input.percent { flex: 1; max-width: 130px; }
    button { 
      padding: 12px 24px; margin: 6px 4px; font-size: 16px; 
      border: none; border-radius: 12px; cursor: pointer; 
    }
    .connect-btn { background: #00ffaa; color: #000; font-weight: bold; }
    .send-btn { background: #ff3366; color: white; font-weight: bold; }
    .small-btn { padding: 8px 16px; font-size: 14px; }
    .template-btn { background: #00aaff; color: white; padding: 10px 18px; }
    .add-btn { background: #00cc88; color: white; }
    .max-btn { background: #444; color: white; font-size: 14px; padding: 8px 12px; }
    .save-btn { background: #ffaa00; color: black; font-weight: bold; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin: 20px 0; padding: 18px; border-radius: 12px; min-height: 170px; line-height: 1.5; }
    .success { background: rgba(0,255,100,0.15); }
    .error { background: rgba(255,50,50,0.15); }
    .loading::after { content: " "; animation: spin 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; margin-top: 40px; color: #888; font-size: 13.5px; }
    #percent-total { font-weight: bold; margin: 12px 0; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Arc USDC Splitter</h1>
    <p><strong>Professional • Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">Connect MetaMask</button>
    <button onclick="disconnectWallet()">Disconnect</button>

    <p id="status">Ready</p>

    <div style="margin:15px 0;">
      <strong>Total Amount (USDC)</strong>
      <div style="display:flex; gap:8px;">
        <input type="number" id="totalAmount" value="100" step="0.01" style="flex:1;">
        <button class="max-btn" onclick="setMaxAmount()">MAX</button>
      </div>
    </div>

    <h3>Quick Templates</h3>
    <div>
      <button class="template-btn" onclick="loadTemplate(1)">50% - 50%</button>
      <button class="template-btn" onclick="loadTemplate(2)">33-33-34%</button>
      <button class="template-btn" onclick="loadTemplate(3)">40% - 60%</button>
      <button class="template-btn" onclick="loadTemplate(4)">Equal Split (4)</button>
    </div>

    <h3>Saved Templates</h3>
    <div id="saved-templates" style="margin-bottom:15px;"></div>
    <button class="save-btn" onclick="saveCurrentTemplate()">💾 Save Current Split</button>

    <h3>Recipients & Percentages</h3>
    <div id="recipients-list"></div>
    <button class="add-btn" onclick="addRecipient()">+ Add Recipient</button>
    <p id="percent-total">Total: 0%</p>

    <button id="sendBtn" class="send-btn" onclick="sendSplit()">Send Real Transaction</button>
    <button onclick="exportHistory()">Export History</button>
    <button class="small-btn" onclick="clearForm()" style="background:#666;color:white;">Clear</button>

    <h3>Recent Transactions</h3>
    <div id="history"></div>

    <div class="footer">
      <p><strong>Testnet Version Only</strong> — Do not use with real funds. Made for Arc Project.</p>
    </div>
  </div>

  <script>
    let signer = null;
    let userAddress = null;
    let transactions = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
    let savedTemplates = JSON.parse(localStorage.getItem('arcSavedTemplates') || '[]');
    let isProcessing = false;

    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";
    const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
    const CHAIN_ID = 5042002;
    const CHAIN_ID_HEX = "0x4cef52";

    const arcNetwork = {
      chainId: CHAIN_ID_HEX,
      chainName: "Arc Testnet",
      nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
      rpcUrls: ["https://rpc.testnet.arc.network"],
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    };

    window.addEventListener('load', async () => {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts.length > 0) {
            userAddress = accounts[0];
            const provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}`;
            document.getElementById("status").className = "success";
            updateUSDCBalance();
          }
        } catch (e) {}
      }
      renderHistory();
      renderSavedTemplates();
      addRecipient();
      addRecipient();
    });

    async function updateUSDCBalance() {
      if (!signer || !userAddress) return;
      try {
        const usdc = new ethers.Contract(USDC_ADDRESS, [
          "function balanceOf(address) view returns (uint256)",
          "function decimals() view returns (uint8)"
        ], signer);
        const balance = await usdc.balanceOf(userAddress);
        const formatted = parseFloat(ethers.formatUnits(balance, await usdc.decimals())).toFixed(4);
        document.getElementById("status").innerHTML += `<br><small>USDC Balance: ${formatted}</small>`;
      } catch(e) {}
    }

    async function setMaxAmount() {
      if (!signer) return alert("Connect wallet first!");
      try {
        const usdc = new ethers.Contract(USDC_ADDRESS, ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"], signer);
        const balance = await usdc.balanceOf(userAddress);
        document.getElementById("totalAmount").value = parseFloat(ethers.formatUnits(balance, await usdc.decimals())).toFixed(4);
      } catch(e) { alert("Could not fetch balance"); }
    }

    function addRecipient() {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row";
      row.innerHTML = `
        <input type="text" class="address" placeholder="0x...">
        <input type="number" class="percent" placeholder="%" step="0.01" oninput="updatePercentTotal()">
        <button onclick="this.parentElement.remove(); updatePercentTotal()" style="background:#ff3366;color:white;padding:10px 14px;">×</button>
      `;
      list.appendChild(row);
      updatePercentTotal();
    }

    function updatePercentTotal() {
      const percents = Array.from(document.querySelectorAll('.percent')).map(el => parseFloat(el.value) || 0);
      const total = percents.reduce((a, b) => a + b, 0);
      const el = document.getElementById("percent-total");
      el.textContent = `Total: ${total.toFixed(2)}%`;
      el.style.color = total === 100 ? "#00ffaa" : total > 100 ? "#ff3366" : "#e0e0ff";
    }

    function loadTemplate(type) {
      const list = document.getElementById("recipients-list");
      list.innerHTML = "";
      if (type === 1) { addRow("0x000...0001", 50); addRow("0x000...0002", 50); }
      else if (type === 2) { addRow("0x000...0001", 33); addRow("0x000...0002", 33); addRow("0x000...0003", 34); }
      else if (type === 3) { addRow("0x000...0001", 40); addRow("0x000...0002", 60); }
      else if (type === 4) {
        for (let i = 1; i <= 4; i++) addRow(`0x000...000${i}`, 25);
      }
    }

    function addRow(address, percent) {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row";
      row.innerHTML = `
        <input type="text" class="address" value="${address}">
        <input type="number" class="percent" value="${percent}" oninput="updatePercentTotal()">
        <button onclick="this.parentElement.remove(); updatePercentTotal()" style="background:#ff3366;color:white;padding:10px 14px;">×</button>
      `;
      list.appendChild(row);
      updatePercentTotal();
    }

    function saveCurrentTemplate() {
      const name = prompt("Enter template name (e.g. Team Salaries):");
      if (!name) return;

      const recipients = [];
      document.querySelectorAll('.recipient-row').forEach(row => {
        const addr = row.querySelector('.address').value.trim();
        const perc = parseFloat(row.querySelector('.percent').value);
        if (addr && perc) recipients.push({address: addr, percent: perc});
      });

      if (recipients.length < 2) return alert("At least 2 recipients required!");

      savedTemplates.unshift({ name, recipients, date: new Date().toLocaleDateString() });
      localStorage.setItem('arcSavedTemplates', JSON.stringify(savedTemplates));
      renderSavedTemplates();
      alert("Template saved successfully!");
    }

    function renderSavedTemplates() {
      const container = document.getElementById("saved-templates");
      let html = "";
      savedTemplates.forEach((tpl, i) => {
        html += `<button class="template-btn" style="margin:4px;" onclick="loadSavedTemplate(${i})">${tpl.name} <small>(${tpl.recipients.length})</small></button>`;
      });
      container.innerHTML = html || "<p>No saved templates yet.</p>";
    }

    function loadSavedTemplate(index) {
      const tpl = savedTemplates[index];
      if (!tpl) return;
      const list = document.getElementById("recipients-list");
      list.innerHTML = "";
      tpl.recipients.forEach(r => addRow(r.address, r.percent));
    }

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();

        const network = await provider.getNetwork();
        if (Number(network.chainId) !== CHAIN_ID) {
          try {
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [arcNetwork] });
              await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] });
            }
          }
        }
        document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}`;
        document.getElementById("status").className = "success";
        await updateUSDCBalance();
      } catch (e) {
        document.getElementById("status").innerHTML = `Error: ${e.message}`;
        document.getElementById("status").className = "error";
      }
    }

    function disconnectWallet() {
      signer = null; userAddress = null;
      document.getElementById("status").innerHTML = "Wallet Disconnected";
    }

    function clearForm() {
      document.getElementById("recipients-list").innerHTML = "";
      document.getElementById("totalAmount").value = "100";
      addRecipient();
      addRecipient();
    }

    async function sendSplit() {
      if (!signer) return alert("Please connect your wallet first!");
      if (isProcessing) return;

      const totalAmount = parseFloat(document.getElementById("totalAmount").value);
      if (!totalAmount || totalAmount <= 0) return alert("Enter a valid amount!");

      const addresses = [];
      const percentages = [];

      document.querySelectorAll('.recipient-row').forEach(row => {
        const addr = row.querySelector('.address').value.trim();
        const perc = parseFloat(row.querySelector('.percent').value);
        if (addr && perc > 0) {
          addresses.push(addr);
          percentages.push(perc);
        }
      });

      if (addresses.length < 2) return alert("At least 2 recipients needed!");
      if (Math.abs(percentages.reduce((a, b) => a + b, 0) - 100) > 0.01) 
        return alert("Percentages must sum exactly to 100%!");

      for (let addr of addresses) {
        if (!ethers.isAddress(addr)) return alert(`Invalid address: ${addr}`);
      }

      let preview = `Sending ${totalAmount} USDC to ${addresses.length} recipients:\n\n`;
      addresses.forEach((addr, i) => {
        const share = (totalAmount * percentages[i] / 100).toFixed(4);
        preview += `${percentages[i]}% → ${addr.slice(0,8)}... = ${share} USDC\n`;
      });
      preview += `\nEstimated Gas: ~0.0005 - 0.002 ARC\n\nContinue?`;

      if (!confirm(preview)) return;

      isProcessing = true;
      const btn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      btn.disabled = true;
      btn.textContent = "Processing...";

      try {
        statusEl.innerHTML = "Approving USDC...";
        statusEl.className = "loading";

        const usdc = new ethers.Contract(USDC_ADDRESS, [
          "function approve(address,uint256) returns (bool)",
          "function decimals() view returns (uint8)"
        ], signer);

        const decimals = await usdc.decimals();
        const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);
        await (await usdc.approve(CONTRACT_ADDRESS, totalWei)).wait();

        statusEl.innerHTML = "Sending Split Transaction...";

        const splitterAbi = [{
          "inputs": [{"name": "recipients", "type": "address[]"}, {"name": "percentages", "type": "uint256[]"}, {"name": "totalAmount", "type": "uint256"}],
          "name": "splitPayment", "outputs": [], "stateMutability": "nonpayable", "type": "function"
        }];

        const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
        const tx = await contract.splitPayment(addresses, percentages.map(p => Math.floor(p)), totalWei);
        await tx.wait();

        transactions.unshift({
          hash: tx.hash,
          intent: `${totalAmount} USDC → ${addresses.length} recipients`,
          time: new Date().toLocaleString()
        });
        localStorage.setItem('arcTxHistory', JSON.stringify(transactions));
        renderHistory();

        statusEl.className = "success";
        statusEl.innerHTML = `✅ Success!<br>Hash: ${tx.hash}<br>
          <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" style="color:#00ffaa;">View on Explorer</a>`;
      } catch (error) {
        statusEl.className = "error";
        statusEl.innerHTML = `Error: ${error.message.substring(0,180)}...`;
      } finally {
        isProcessing = false;
        btn.disabled = false;
        btn.textContent = "Send Real Transaction";
      }
    }

    function renderHistory() {
      let html = "";
      transactions.forEach(tx => {
        html += `<div style="background:rgba(255,255,255,0.05); padding:14px; margin:10px 0; border-radius:12px;">
          <small>${tx.time}</small><br>${tx.intent}<br>
          <small><a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View Tx</a></small>
        </div>`;
      });
      document.getElementById("history").innerHTML = html || "<p>No transactions yet.</p>";
    }

    function exportHistory() {
      if (transactions.length === 0) return alert("No history to export!");
      const dataStr = JSON.stringify(transactions, null, 2);
      const a = document.createElement('a');
      a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
      a.download = `arc-splitter-history-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      alert("History exported!");
    }
  </script>
</body>
</html>
