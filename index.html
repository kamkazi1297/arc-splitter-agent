<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit - Choose Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-4xl mx-auto px-6 py-24 text-center">
    <h1 class="text-6xl font-bold mb-4">ArcSplit</h1>
    <p class="text-2xl text-gray-400 mb-16">Choose your tool</p>

    <div class="grid md:grid-cols-2 gap-8">
      <a href="split.html" class="glass block p-12 rounded-3xl border border-white/10 hover:border-emerald-500 transition-all group">
        <h2 class="text-3xl font-bold mb-4">Token Splitter</h2>
        <p class="text-gray-400">Split tokens with custom percentages</p>
        <span class="inline-block mt-8 text-emerald-400 group-hover:translate-x-2 transition">Launch →</span>
      </a>

      <a href="giveaway.html" class="glass block p-12 rounded-3xl border border-white/10 hover:border-pink-500 transition-all group">
        <h2 class="text-3xl font-bold mb-4">Giveaway Tool</h2>
        <p class="text-gray-400">Create giveaways and distribute to winners</p>
        <span class="inline-block mt-8 text-pink-400 group-hover:translate-x-2 transition">Launch →</span>
      </a>
    </div>
  </div>
</body>
</html>
