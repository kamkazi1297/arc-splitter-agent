<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: Arial; background: linear-gradient(135deg, #0f0f23, #1a1a2e); color: white; text-align: center; padding: 30px; }
    .container { max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.06); padding: 35px; border-radius: 20px; }
    button { padding: 14px 30px; margin: 10px; font-size: 17px; border-radius: 12px; cursor: pointer; }
    input { width: 80%; padding: 12px; margin: 10px; border-radius: 10px; background: #1e1e2e; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>

    <button onclick="connectWallet()">🔗 Connect MetaMask</button>
    <p id="status"></p>

    <h3>Connect to Telegram</h3>
    <input type="text" id="tg_username" placeholder="Telegram Username (without @)" />
    <button onclick="sendTelegramConnect()">📱 Send Confirmation to Telegram</button>
  </div>

  <script>
    let signer = null;
    let userAddress = null;

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();
      document.getElementById("status").innerHTML = `✅ Wallet: ${userAddress}`;
    }

    async function sendTelegramConnect() {
      if (!userAddress) {
        alert("First connect MetaMask!");
        return;
      }
      const tg = document.getElementById("tg_username").value.trim();
      if (!tg) return alert("Enter Telegram username!");

      alert(`✅ Request sent to @${tg}\n\nPlease check your Telegram bot and confirm the connection.`);
      
      // اینجا بعداً به backend (Railway) درخواست ارسال پیام تأیید می‌فرستیم
    }
  </script>
</body>
</html>
