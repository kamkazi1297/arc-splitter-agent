<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f0f23, #1a1a2e); color: white; text-align: center; padding: 30px; }
    .container { max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.06); padding: 30px; border-radius: 20px; }
    button { padding: 14px 28px; font-size: 17px; margin: 10px; border-radius: 12px; }
    .connect-btn { background: #00ff9d; color: black; }
    .send-btn { background: #ff2d55; color: white; }
    input, textarea { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #1e1e2e; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>
    <p><strong>Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">🔗 Connect MetaMask</button>
    <p id="status"></p>

    <h3>Link to Telegram</h3>
    <input type="text" id="telegram_id" placeholder="Your Telegram Username or ID (e.g. @username or 123456789)" /><br>

    <h3>Enter Split Intent</h3>
    <textarea id="intent" placeholder="Send 50 USDC, 40% to 0x123..., 60% to 0x456..."></textarea><br>
    
    <button class="send-btn" onclick="sendSplit()">🚀 Send Split Transaction</button>
  </div>

  <script>
    let signer = null;
    let userAddress = null;

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();
      document.getElementById("status").innerHTML = `✅ Connected: ${userAddress}`;
    }

    async function sendSplit() {
      if (!signer || !userAddress) return alert("Connect MetaMask first!");

      const telegram = document.getElementById("telegram_id").value.trim();
      const intentText = document.getElementById("intent").value.trim();

      if (!telegram) return alert("Please enter your Telegram username or ID!");

      alert(`✅ Intent received!\nTelegram: ${telegram}\nWallet: ${userAddress}\n\nTransaction will be sent after confirmation in Telegram.`);
      // اینجا بعداً به بک‌اند ارسال می‌کنیم
    }
  </script>
</body>
</html>
