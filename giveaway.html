<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Giveaway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
    .light .glass { background: rgba(255,255,255,0.88); border-color: rgba(0,0,0,0.12); }

    .light body, .light h1, .light label { color: #1f2937; }

    select, input, textarea {
      background-color: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .light select, .light input, .light textarea {
      background-color: #f8fafc;
      color: #1f2937;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-4xl font-bold">Giveaway Tool</h1>
      <div class="flex gap-3">
        <button onclick="toggleTheme()" id="themeBtn" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl">
          <i class="fas fa-moon"></i>
        </button>
        <button onclick="connectWallet()" id="connectBtn" class="px-6 py-3 bg-white text-black font-semibold rounded-2xl flex items-center gap-2">
          <i class="fas fa-wallet"></i> <span id="connectText">Connect Wallet</span>
        </button>
      </div>
    </div>

    <div class="glass border border-white/10 rounded-3xl p-8">
      <!-- فرم‌ها همان قبلی -->
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-gray-400 text-sm mb-2">Token</label>
          <select id="tokenSelect" class="w-full rounded-2xl px-6 py-5">
            <option value="0x3600000000000000000000000000000000000000">USDC</option>
            <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
            <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Total Amount</label>
          <input type="number" id="totalAmount" value="100" step="0.000001" class="w-full rounded-2xl px-6 py-5 text-2xl">
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Number of Winners</label>
        <input type="number" id="winnerCount" value="10" min="1" class="w-full rounded-2xl px-6 py-5 text-2xl">
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Description</label>
        <textarea id="description" rows="2" class="w-full rounded-2xl px-6 py-5" placeholder="Example: Comment your wallet..."></textarea>
      </div>

      <div class="flex gap-3 mb-8">
        <button onclick="generateTweetText()" class="flex-1 py-4 bg-[#1DA1F2] rounded-2xl font-medium">Twitter Text</button>
        <button onclick="selectRandomWinners()" class="flex-1 py-4 bg-purple-600 rounded-2xl font-medium">🎲 Random Select</button>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-3">Winner Addresses</label>
        <textarea id="winnersList" rows="7" class="w-full rounded-2xl px-6 py-5 font-mono text-sm" placeholder="One address per line"></textarea>
      </div>

      <button onclick="sendGiveawaySplit()" 
              class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-7 rounded-3xl text-xl font-bold">
        Send Split to Winners
      </button>
    </div>
  </div>

<script>
const CONTRACT_ADDRESS = "0x73Da94F0D960Ef8FD49Ed28a94f667aF3C062cB2";

let signer = null;
let userAddress = null;

const splitterAbi = [{
  "inputs": [
    { "name": "token", "type": "address" },
    { "name": "recipients", "type": "address[]" },
    { "name": "percentages", "type": "uint256[]" },
    { "name": "totalAmount", "type": "uint256" }
  ],
  "name": "splitPayment",
  "outputs": [],
  "stateMutability": "nonpayable",
  "type": "function"
}];

function toggleTheme() {
  document.documentElement.classList.toggle('light');
  const icon = document.getElementById("themeBtn").querySelector("i");
  icon.classList.toggle("fa-moon");
  icon.classList.toggle("fa-sun");
}

async function connectWallet() {
  if (!window.ethereum) return alert("MetaMask not found!");
  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddress = accounts[0];
    signer = await provider.getSigner();
    document.getElementById("connectText").textContent = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
  } catch (e) {
    alert("Connection failed");
  }
}

function generateTweetText() { /* همان قبلی */ 
  const amount = document.getElementById("totalAmount").value;
  const token = document.getElementById("tokenSelect").selectedOptions[0].text;
  const count = document.getElementById("winnerCount").value;
  const text = `🎁 GIVEAWAY!\n\n${amount} ${token} to ${count} lucky winners!\n\nComment your wallet address below 👇\nGood luck!`;
  navigator.clipboard.writeText(text);
  alert("Twitter text copied!");
}

function selectRandomWinners() { /* همان قبلی */ 
  const text = document.getElementById("winnersList").value.trim();
  if (!text) return alert("Please enter addresses first!");
  let addresses = text.split("\n").map(a => a.trim()).filter(a => a.length > 10);
  const count = parseInt(document.getElementById("winnerCount").value);
  if (addresses.length < count) return alert("Not enough addresses!");
  const shuffled = addresses.sort(() => 0.5 - Math.random());
  document.getElementById("winnersList").value = shuffled.slice(0, count).join("\n");
  alert(`${count} winners randomly selected!`);
}

async function sendGiveawaySplit() {
  if (!signer) return alert("Please connect your wallet first!");

  const listText = document.getElementById("winnersList").value.trim();
  if (!listText) return alert("No addresses!");

  const addresses = listText.split("\n").map(a => a.trim()).filter(a => ethers.isAddress(a));
  const totalAmount = parseFloat(document.getElementById("totalAmount").value);
  const tokenAddr = document.getElementById("tokenSelect").value;

  if (addresses.length === 0) return alert("No valid addresses!");

  const perWinnerPercent = (100 / addresses.length).toFixed(6);
  const percentages = addresses.map(() => Math.floor(perWinnerPercent * 100));

  if (!confirm(`Send ${totalAmount} to ${addresses.length} winners?`)) return;

  try {
    const tokenContract = new ethers.Contract(tokenAddr, [
      "function approve(address,uint256) returns (bool)",
      "function decimals() view returns (uint8)"
    ], signer);

    const decimals = await tokenContract.decimals();
    const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);

    // Approve
    await (await tokenContract.approve(CONTRACT_ADDRESS, totalWei)).wait();

    // Split
    const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
    const tx = await contract.splitPayment(tokenAddr, addresses, percentages, totalWei, { gasLimit: 800000 });
    await tx.wait();

    alert(`✅ Transaction sent successfully!\nHash: ${tx.hash}`);
  } catch (error) {
    console.error(error);
    alert("Transaction failed: " + (error.reason || error.message));
  }
}
</script>
</body>
</html>
