<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter - Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a0a1f, #1a1a35); color: #e0e0ff; margin: 0; padding: 20px; }
    .container { max-width: 780px; margin: 0 auto; background: rgba(255,255,255,0.07); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    h1 { color: #00ffaa; }
    button { padding: 14px 32px; margin: 8px; font-size: 17px; border: none; border-radius: 14px; cursor: pointer; }
    .connect-btn { background: #00ffaa; color: #000; font-weight: bold; }
    .send-btn { background: #ff3366; color: white; font-weight: bold; }
    textarea { width: 100%; height: 150px; padding: 16px; margin: 15px 0; border-radius: 14px; background: #151525; color: white; border: 1px solid #00ffaa; }
    #status { margin: 20px 0; padding: 18px; border-radius: 12px; background: rgba(0,255,170,0.1); min-height: 80px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>
    <p><strong>Real Transaction • Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">🔗 Connect MetaMask</button>
    
    <p id="status"></p>

    <h3>Enter Split Intent</h3>
    <textarea id="intent" placeholder="Send 50 USDC, 40% to 0x123..., 60% to 0x456..."></textarea><br>
    
    <button class="send-btn" onclick="sendSplit()">🚀 Send Real Transaction</button>
  </div>

  <script>
    let signer = null;
    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const address = await signer.getAddress();
        document.getElementById("status").innerHTML = `✅ Connected: ${address}`;
      } catch (e) {
        document.getElementById("status").innerHTML = "❌ Connection failed";
      }
    }

    function parseIntent(text) {
      const addresses = text.match(/0x[a-fA-F0-9]{40}/g) || [];
      const percentages = text.match(/(\d+)[٪%]/g) || [];
      const percentNumbers = percentages.map(p => parseInt(p));
      const amountMatch = text.match(/(\d+)\s*USDC/i);
      const total = amountMatch ? parseInt(amountMatch[1]) : 10;
      return { addresses, percentages: percentNumbers, total };
    }

    async function sendSplit() {
      if (!signer) return alert("Please connect MetaMask first!");

      const intentText = document.getElementById("intent").value.trim();
      if (!intentText) return alert("Please enter intent!");

      const { addresses, percentages, total } = parseIntent(intentText);

      if (addresses.length === 0 || percentages.length === 0) return alert("Could not parse addresses or percentages!");
      if (percentages.reduce((a, b) => a + b, 0) !== 100) return alert("Percentages must sum to 100%");

      try {
        document.getElementById("status").innerHTML = "⏳ Please sign the transaction in MetaMask...";

        const abi = [{
          "inputs": [
            {"name": "recipients", "type": "address[]"},
            {"name": "percentages", "type": "uint256[]"},
            {"name": "totalAmount", "type": "uint256"}
          ],
          "name": "splitPayment",
          "outputs": [],
          "stateMutability": "nonpayable",
          "type": "function"
        }];

        const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);
        const totalWei = BigInt(total) * BigInt(1000000);

        const tx = await contract.splitPayment(addresses, percentages, totalWei);
        
        document.getElementById("status").innerHTML = "⏳ Waiting for confirmation...";
        await tx.wait();

        document.getElementById("status").innerHTML = `
          ✅ Real Transaction Confirmed!<br><br>
          Hash: ${tx.hash}<br><br>
          <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" style="color:#00ffaa;">
            🔗 View on Arc Explorer
          </a>
        `;

      } catch (error) {
        document.getElementById("status").innerHTML = `❌ Transaction rejected or failed.<br>${error.message.substring(0,100)}...`;
      }
    }
  </script>
</body>
</html>
