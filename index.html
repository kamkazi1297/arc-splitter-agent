<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #0f0f23, #1a1a2e); 
      color: #ffffff; 
      text-align: center; 
      padding: 30px; 
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    button { 
      padding: 14px 28px; 
      font-size: 17px; 
      margin: 10px; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
    }
    .connect-btn { background: #00ff9d; color: black; font-weight: bold; }
    .send-btn { background: #ff2d55; color: white; font-weight: bold; }
    textarea { 
      width: 90%; 
      height: 130px; 
      padding: 15px; 
      margin: 15px 0; 
      border-radius: 12px; 
      background: #1e1e2e; 
      color: white; 
      border: 1px solid #00ff9d; 
    }
    #status { 
      margin: 20px 0; 
      font-size: 16px; 
      min-height: 80px; 
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>
    <p><strong>Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">🔗 Connect MetaMask</button>
    <p id="status"></p>

    <h3>Enter your Split Intent</h3>
    <textarea id="intent" placeholder="Send 50 USDC, 40% to 0x123..., 60% to 0x456..."></textarea><br>
    
    <button class="send-btn" onclick="sendSplit()">🚀 Send Split Transaction</button>
  </div>

  <script>
    let signer = null;
    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";

    async function connectWallet() {
      if (!window.ethereum) {
        document.getElementById("status").innerHTML = "❌ MetaMask not found!";
        return;
      }
      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const address = await signer.getAddress();
        document.getElementById("status").innerHTML = `✅ Connected: ${address}`;
      } catch (error) {
        document.getElementById("status").innerHTML = "❌ Connection failed";
      }
    }

    function parseIntent(text) {
      const addresses = text.match(/0x[a-fA-F0-9]{40}/g) || [];
      const percentages = text.match(/(\d+)[٪%]/g) || [];
      const percentNumbers = percentages.map(p => parseInt(p));
      const amountMatch = text.match(/(\d+)\s*USDC/i);
      const total = amountMatch ? parseInt(amountMatch[1]) : 10;
      return { addresses, percentages: percentNumbers, total };
    }

    async function sendSplit() {
      if (!signer) {
        alert("Please connect MetaMask first!");
        return;
      }

      const intentText = document.getElementById("intent").value.trim();
      if (!intentText) {
        alert("Please enter your intent!");
        return;
      }

      const { addresses, percentages, total } = parseIntent(intentText);

      if (addresses.length === 0 || percentages.length === 0) {
        alert("Could not parse addresses or percentages!");
        return;
      }
      if (percentages.reduce((a,b)=>a+b,0) !== 100) {
        alert("Percentages must add up to 100%");
        return;
      }

      try {
        document.getElementById("status").innerHTML = "⏳ Sending transaction...";

        const abi = [{
          "inputs": [
            {"name": "recipients", "type": "address[]"},
            {"name": "percentages", "type": "uint256[]"},
            {"name": "totalAmount", "type": "uint256"}
          ],
          "name": "splitPayment",
          "outputs": [],
          "stateMutability": "nonpayable",
          "type": "function"
        }];

        const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);
        const totalWei = BigInt(total) * BigInt(1000000);

        const tx = await contract.splitPayment(addresses, percentages, totalWei);
        await tx.wait();

        const explorerLink = `https://testnet.arcscan.app/tx/${tx.hash}`;
        
        document.getElementById("status").innerHTML = `
          ✅ Transaction Successful!<br><br>
          <strong>Hash:</strong> ${tx.hash}<br><br>
          <a href="${explorerLink}" target="_blank" style="color:#00ff9d; text-decoration:underline;">
            🔗 View on Arc Explorer
          </a>
        `;

      } catch (error) {
        console.error(error);
        document.getElementById("status").innerHTML = `❌ Error: ${error.message.substring(0,100)}...`;
      }
    }
  </script>
</body>
</html>
