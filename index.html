<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 40px; 
      background: #0a0a0a; 
      color: white;
    }
    button { 
      padding: 15px 30px; 
      font-size: 18px; 
      margin: 15px; 
      border-radius: 8px;
    }
    textarea { width: 80%; height: 100px; margin: 15px; }
    #status { margin: 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>🪓 Arc USDC Splitter</h1>
  <p><strong>Arc Testnet</strong></p>

  <button onclick="connectWallet()">🔗 Connect MetaMask</button>
  <p id="status"></p>

  <h3>Enter your Split Intent</h3>
  <textarea id="intent" placeholder="Send 100 USDC, 50% to 0x123..., 50% to 0x456..."></textarea><br><br>
  
  <button onclick="sendSplit()">🚀 Send Split Transaction</button>

  <script>
    let signer = null;

    async function connectWallet() {
      if (!window.ethereum) {
        document.getElementById("status").innerHTML = "❌ MetaMask not found!";
        return;
      }
      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const address = await signer.getAddress();
        document.getElementById("status").innerHTML = `✅ Connected: ${address}`;
      } catch (error) {
        document.getElementById("status").innerHTML = "❌ Failed to connect";
      }
    }

    async function sendSplit() {
      if (!signer) {
        alert("Please connect your wallet first!");
        return;
      }
      const intent = document.getElementById("intent").value;
      if (!intent) {
        alert("Please enter your intent!");
        return;
      }
      alert("✅ Intent received!\n\nTransaction sending feature will be added in next step.");
    }
  </script>
</body>
</html>
