<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Pro • Token Splitter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
    }
    .gradient-text {
      background: linear-gradient(90deg, #00ffaa, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn-gradient {
      background: linear-gradient(90deg, #ff3366, #ff6699);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-gradient:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -5px rgb(255 51 102 / 0.4);
    }
    .recipient-row {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] via-[#1a1a2e] to-[#0f0f24] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl">⚡</div>
        <div>
          <h1 class="text-4xl font-bold gradient-text">ArcSplit Pro</h1>
          <p class="text-gray-400">Professional Token Splitter</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="toggleTheme()" class="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all">
          <i class="fas fa-moon"></i>
        </button>
        <button onclick="connectWallet()" id="connectBtn"
                class="px-6 py-3 bg-white text-black font-semibold rounded-2xl flex items-center gap-2 hover:bg-gray-100">
          <i class="fas fa-wallet"></i>
          <span>Connect Wallet</span>
        </button>
      </div>
    </div>

    <!-- Status -->
    <div id="status" class="glass border border-white/10 rounded-3xl p-6 mb-8 flex items-center gap-3 text-sm">
      Ready to split tokens on Arc Testnet
    </div>

    <div class="glass border border-white/10 rounded-3xl p-8">

      <!-- Token Select -->
      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2 font-medium">Select Token</label>
        <select id="tokenSelect" onchange="updateBalance()" 
                class="w-full bg-white/5 border border-white/20 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-emerald-500">
          <option value="0x3600000000000000000000000000000000000000">USDC</option>
          <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
          <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
        </select>
      </div>

      <!-- Total Amount -->
      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2 font-medium">Total Amount</label>
        <div class="flex gap-3">
          <input type="number" id="totalAmount" value="100" step="0.000001" 
                 class="flex-1 bg-white/5 border border-white/20 rounded-2xl px-6 py-5 text-3xl focus:outline-none focus:border-emerald-500">
          <button onclick="setMaxAmount()" class="px-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">MAX</button>
        </div>
      </div>

      <!-- Quick Templates -->
      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-3 font-medium">Quick Templates</label>
        <div class="grid grid-cols-4 gap-3">
          <button onclick="loadTemplate(1)" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">50-50</button>
          <button onclick="loadTemplate(2)" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">33-33-34</button>
          <button onclick="loadTemplate(3)" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">40-60</button>
          <button onclick="equalSplit()" class="py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm">Equal</button>
        </div>
      </div>

      <!-- Recipients -->
      <div class="mb-8">
        <div class="flex justify-between mb-4">
          <h3 class="font-semibold">Recipients</h3>
          <button onclick="addRecipient()" class="text-emerald-400 hover:text-emerald-300 flex items-center gap-1 text-sm">
            <i class="fas fa-plus"></i> Add Recipient
          </button>
        </div>
        <div id="recipients-list" class="space-y-4"></div>
      </div>

      <div class="flex justify-between items-center mb-8">
        <span id="percent-total" class="font-bold text-lg">Total: 0%</span>
        <button onclick="distributeRemaining()" class="text-amber-400 hover:text-amber-300">Distribute Remaining</button>
      </div>

      <!-- Send Button -->
      <button id="sendBtn" onclick="sendSplit()" 
              class="w-full btn-gradient py-7 rounded-3xl text-xl font-bold">
        Send Split Transaction
      </button>
    </div>

    <div class="mt-8 text-center text-amber-400 text-sm flex items-center justify-center gap-2">
      <i class="fas fa-triangle-exclamation"></i>
      Testnet Only — Do not use real funds
    </div>
  </div>

  <script>
    let signer = null;
    let userAddress = null;
    let transactions = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
    let isProcessing = false;
    let isLightMode = false;

    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";
    const CHAIN_ID = 5042002;
    const CHAIN_ID_HEX = "0x4cef52";

    const arcNetwork = {
      chainId: CHAIN_ID_HEX,
      chainName: "Arc Testnet",
      nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
      rpcUrls: ["https://rpc.testnet.arc.network"],
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    };

    function toggleTheme() {
      isLightMode = !isLightMode;
      document.documentElement.classList.toggle('light', isLightMode);
    }

    window.addEventListener('load', async () => {
      addRecipient();
      addRecipient();
      if (window.ethereum) {
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if (accounts.length > 0) {
          userAddress = accounts[0];
          const provider = new ethers.BrowserProvider(window.ethereum);
          signer = await provider.getSigner();
          updateBalance();
        }
      }
    });

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        document.getElementById("connectBtn").innerHTML = `<i class="fas fa-wallet"></i> Connected`;
        updateBalance();
      } catch (e) { console.error(e); }
    }

    async function updateBalance() {
      if (!signer || !userAddress) return;
      try {
        const tokenAddr = document.getElementById("tokenSelect").value;
        const contract = new ethers.Contract(tokenAddr, ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"], signer);
        const balance = await contract.balanceOf(userAddress);
        const decimals = await contract.decimals();
        const formatted = parseFloat(ethers.formatUnits(balance, decimals)).toFixed(4);
        const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;
        document.getElementById("status").innerHTML = `Connected • Balance: <span class="text-emerald-400">${formatted} ${symbol}</span>`;
      } catch(e) {}
    }

    async function setMaxAmount() {
      if (!signer) return alert("Connect wallet first!");
      try {
        const tokenAddr = document.getElementById("tokenSelect").value;
        const contract = new ethers.Contract(tokenAddr, ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"], signer);
        const balance = await contract.balanceOf(userAddress);
        const decimals = await contract.decimals();
        document.getElementById("totalAmount").value = parseFloat(ethers.formatUnits(balance, decimals)).toFixed(6);
      } catch(e) { alert("Could not fetch balance"); }
    }

    function addRecipient() {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row glass border border-white/10 rounded-2xl p-5 flex items-center gap-4";
      row.innerHTML = `
        <input type="text" class="address flex-1 bg-transparent border border-white/20 rounded-xl px-5 py-4 focus:outline-none" placeholder="0x...">
        <input type="number" class="percent w-28 bg-transparent border border-white/20 rounded-xl px-5 py-4 text-center focus:outline-none" placeholder="%" step="0.01" oninput="updatePercentTotal()">
        <button onclick="this.parentElement.remove(); updatePercentTotal()" class="text-rose-400 hover:text-rose-500 text-3xl">×</button>
      `;
      list.appendChild(row);
      updatePercentTotal();
    }

    function updatePercentTotal() {
      const percents = Array.from(document.querySelectorAll('.percent')).map(el => parseFloat(el.value) || 0);
      const total = percents.reduce((a, b) => a + b, 0);
      const el = document.getElementById("percent-total");
      el.textContent = `Total: ${total.toFixed(2)}%`;
      el.style.color = total === 100 ? '#00ffaa' : (total > 100 ? '#ff3366' : 'white');
    }

    function distributeRemaining() {
      const percents = Array.from(document.querySelectorAll('.percent'));
      let total = percents.reduce((sum, el) => sum + (parseFloat(el.value) || 0), 0);
      let remaining = 100 - total;
      if (remaining <= 0.01) return alert("No remaining percentage!");
      percents[percents.length - 1].value = remaining;
      updatePercentTotal();
    }

    function loadTemplate(type) {
      const list = document.getElementById("recipients-list");
      list.innerHTML = "";
      if (type === 1) { addRow("0x000...0001", 50); addRow("0x000...0002", 50); }
      else if (type === 2) { addRow("0x000...0001", 33); addRow("0x000...0002", 33); addRow("0x000...0003", 34); }
      else if (type === 3) { addRow("0x000...0001", 40); addRow("0x000...0002", 60); }
    }

    function equalSplit() {
      const count = 4;
      const list = document.getElementById("recipients-list");
      list.innerHTML = "";
      const percent = (100 / count).toFixed(2);
      for (let i = 1; i <= count; i++) addRow(`0x000...000${i}`, parseFloat(percent));
    }

    function addRow(address, percent) {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row glass border border-white/10 rounded-2xl p-5 flex items-center gap-4";
      row.innerHTML = `
        <input type="text" class="address flex-1 bg-transparent border border-white/20 rounded-xl px-5 py-4 focus:outline-none" value="${address}">
        <input type="number" class="percent w-28 bg-transparent border border-white/20 rounded-xl px-5 py-4 text-center focus:outline-none" value="${percent}" oninput="updatePercentTotal()">
        <button onclick="this.parentElement.remove(); updatePercentTotal()" class="text-rose-400 hover:text-rose-500 text-3xl">×</button>
      `;
      list.appendChild(row);
      updatePercentTotal();
    }

    async function sendSplit() {
      if (!signer) return alert("Please connect your wallet first!");
      if (isProcessing) return;

      const totalAmountStr = document.getElementById("totalAmount").value;
      const totalAmount = parseFloat(totalAmountStr);
      if (!totalAmount || totalAmount <= 0) return alert("Enter a valid amount!");

      const tokenAddr = document.getElementById("tokenSelect").value;
      const symbol = document.getElementById("tokenSelect").selectedOptions[0].text;

      const addresses = [];
      const percentages = [];

      document.querySelectorAll('.recipient-row').forEach(row => {
        const addr = row.querySelector('.address').value.trim();
        const perc = parseFloat(row.querySelector('.percent').value) || 0;
        if (addr && perc > 0) {
          addresses.push(addr);
          percentages.push(Math.floor(perc));
        }
      });

      if (addresses.length < 2) return alert("At least 2 recipients needed!");
      if (percentages.reduce((a, b) => a + b, 0) !== 100) return alert("Percentages must sum exactly to 100%!");

      for (let addr of addresses) {
        if (!ethers.isAddress(addr)) return alert(`Invalid address: ${addr}`);
      }

      if (!confirm(`Send ${totalAmount} ${symbol} to ${addresses.length} recipients?`)) return;

      isProcessing = true;
      const btn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      btn.disabled = true;
      btn.textContent = "Processing...";

      try {
        statusEl.innerHTML = `Approving ${symbol}...`;

        const tokenContract = new ethers.Contract(tokenAddr, [
          "function approve(address,uint256) returns (bool)",
          "function decimals() view returns (uint8)"
        ], signer);

        const decimals = await tokenContract.decimals();
        const totalWei = ethers.parseUnits(totalAmountStr, decimals);

        await (await tokenContract.approve(CONTRACT_ADDRESS, totalWei)).wait();

        statusEl.innerHTML = `Sending transaction...`;

        const splitterAbi = [{"inputs":[{"name":"recipients","type":"address[]"},{"name":"percentages","type":"uint256[]"},{"name":"totalAmount","type":"uint256"}],"name":"splitPayment","outputs":[],"stateMutability":"nonpayable","type":"function"}];
        const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);

        const tx = await contract.splitPayment(addresses, percentages, totalWei, { gasLimit: 800000 });
        await tx.wait();

        statusEl.innerHTML = `✅ Transaction Confirmed!<br>Hash: ${tx.hash}`;

      } catch (error) {
        console.error(error);
        let msg = error.reason || error.message || "Transaction failed";
        statusEl.innerHTML = `❌ Failed: ${msg}`;
      } finally {
        isProcessing = false;
        btn.disabled = false;
        btn.textContent = "Send Split Transaction";
      }
    }
  </script>
</body>
</html>
