<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Splitter - Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --primary: #00ffaa;
      --accent: #ff3366;
    }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background: linear-gradient(135deg, #0a0a1f, #1a1a35); 
      color: #e0e0ff; 
      margin: 0; padding: 20px; 
      transition: all 0.4s;
    }
    body.light {
      background: linear-gradient(135deg, #f0f0f5, #e0e0f0);
      color: #222;
    }
    .container { 
      max-width: 820px; margin: 0 auto; 
      background: rgba(255,255,255,0.08); 
      padding: 40px; border-radius: 28px; 
      box-shadow: 0 25px 60px rgba(0,0,0,0.7); 
      border: 1px solid rgba(0,255,170,0.15);
    }
    body.light .container {
      background: rgba(255,255,255,0.95);
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      border-color: #ddd;
    }

    h1 { color: var(--primary); text-align: center; }
    body.light h1 { color: #00aa77; }

    select, input { 
      padding: 14px; margin: 8px 0; 
      border-radius: 14px; background: #12122b; color: white; 
      border: 1px solid #00ffaa; font-size: 16px;
    }
    body.light select, body.light input {
      background: white; color: #222; border-color: #00aa77;
    }

    /* ==================== فیکس اصلی ==================== */
    .recipient-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: nowrap;           /* مهم */
      overflow: hidden;
    }

    .recipient-row input.address { 
      flex: 1; 
      min-width: 180px;
    }
    
    .recipient-row .percent-container {
      position: relative;
      flex: 0 0 130px;
      min-width: 130px;
    }

    .recipient-row .percent-container input {
      width: 100%;
      padding-right: 32px;
      text-align: right;
    }

    .recipient-row .percent-container::after {
      content: "%";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #00ffaa;
      font-weight: bold;
      pointer-events: none;
    }

    .delete-btn {
      background: #ff3366;
      color: white;
      font-size: 22px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      border: none;
    }

    /* موبایل */
    @media (max-width: 640px) {
      .recipient-row {
        flex-wrap: wrap;
      }
      .recipient-row .percent-container {
        flex: 0 0 110px;
      }
      .delete-btn {
        margin-top: 8px;
      }
    }

    button { 
      padding: 12px 24px; margin: 6px 4px; font-size: 16px; 
      border: none; border-radius: 12px; cursor: pointer; 
    }
    .connect-btn { background: var(--primary); color: #000; font-weight: bold; }
    .send-btn { background: var(--accent); color: white; font-weight: bold; }

    #status { 
      margin: 20px 0; 
      padding: 20px; 
      border-radius: 16px; 
      min-height: 160px; 
      line-height: 1.6;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #00ffaa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .history-item {
      background: rgba(255,255,255,0.05); 
      padding: 14px; 
      margin: 10px 0; 
      border-radius: 12px;
    }
    body.light .history-item { background: #f8f8f8; color: #222; }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .footer { text-align: center; margin-top: 50px; color: #777; font-size: 14px; }
    #percent-total { font-weight: bold; margin: 15px 0; font-size: 17px; }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h1>Arc Splitter Pro</h1>
      <button onclick="toggleTheme()" style="background:none; border:1px solid #00ffaa; color:#00ffaa; padding:8px 16px; border-radius:999px; font-size:14px;">
        🌗 Toggle Theme
      </button>
    </div>
    <p><strong>Arc Testnet • Multi Token • Advanced</strong></p>

    <button class="connect-btn" onclick="connectWallet()">Connect MetaMask</button>
    <button onclick="disconnectWallet()">Disconnect</button>

    <p id="status">Ready to split tokens on Arc Testnet.</p>

    <div style="margin:15px 0;">
      <strong>Select Token</strong>
      <select id="tokenSelect" onchange="updateBalance()">
        <option value="0x3600000000000000000000000000000000000000">USDC</option>
        <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
        <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
      </select>
    </div>

    <div style="margin:15px 0;">
      <strong>Total Amount</strong>
      <div style="display:flex; gap:8px;">
        <input type="number" id="totalAmount" value="100" step="0.000001" style="flex:1;">
        <button onclick="setMaxAmount()" style="background:#555;color:white;">MAX</button>
      </div>
    </div>

    <div style="margin:15px 0;">
      <strong>Slippage Tolerance (%)</strong>
      <input type="number" id="slippage" value="0.5" step="0.1" style="width:140px;">
    </div>

    <h3>Quick Templates</h3>
    <div>
      <button onclick="loadTemplate(1)" style="background:#0099ff;color:white;">50% - 50%</button>
      <button onclick="loadTemplate(2)" style="background:#0099ff;color:white;">33-33-34%</button>
      <button onclick="loadTemplate(3)" style="background:#0099ff;color:white;">40% - 60%</button>
      <button onclick="equalSplit()" style="background:#0099ff;color:white;">Equal Split</button>
    </div>

    <div style="margin:15px 0;">
      <strong>Number of Equal Recipients:</strong>
      <input type="number" id="equalCount" value="4" min="2" max="10" style="width:80px; text-align:center;">
    </div>

    <h3>Recipients & Percentages</h3>
    <div id="recipients-list"></div>
    <button onclick="addRecipient()" style="background:#00cc88;color:white;">+ Add Recipient</button>
    <p id="percent-total">Total: 0%</p>

    <button id="sendBtn" class="send-btn" onclick="sendSplit()">Send Split Transaction</button>
    <button onclick="exportHistory()">Export History</button>
    <button onclick="clearForm()" style="background:#555;color:white;">Clear Form</button>

    <h3>Recent Transactions</h3>
    <div id="history"></div>
    <div id="pagination" class="pagination"></div>

    <div class="footer">
      <p><strong>Testnet Only</strong> — Do not use with real funds.</p>
    </div>
  </div>

  <script>
    let signer = null;
    let userAddress = null;
    let transactions = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
    let isProcessing = false;
    let isLightMode = false;
    let currentPage = 1;
    const itemsPerPage = 10;

    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";
    const CHAIN_ID = 5042002;
    const CHAIN_ID_HEX = "0x4cef52";

    const arcNetwork = {
      chainId: CHAIN_ID_HEX,
      chainName: "Arc Testnet",
      nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
      rpcUrls: ["https://rpc.testnet.arc.network"],
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    };

    function toggleTheme() {
      isLightMode = !isLightMode;
      document.body.classList.toggle('light', isLightMode);
    }

    window.addEventListener('load', async () => {
      renderHistory();
      addRecipient();
      addRecipient();

      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts.length > 0) {
            userAddress = accounts[0];
            const provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}`;
            updateBalance();
          }
        } catch (e) {}
      }
    });

    async function getCurrentToken() { return document.getElementById("tokenSelect").value; }
    async function getTokenSymbol() { return document.getElementById("tokenSelect").selectedOptions[0].text; }

    async function updateBalance() {
      if (!signer || !userAddress) return;
      try {
        const tokenAddr = await getCurrentToken();
        const contract = new ethers.Contract(tokenAddr, ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"], signer);
        const balance = await contract.balanceOf(userAddress);
        const decimals = await contract.decimals();
        const formatted = parseFloat(ethers.formatUnits(balance, decimals)).toFixed(4);
        const symbol = await getTokenSymbol();
        document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}<br><small>Balance: ${formatted} ${symbol}</small>`;
      } catch(e) {}
    }

    async function setMaxAmount() {
      if (!signer) return alert("Connect wallet first!");
      try {
        const tokenAddr = await getCurrentToken();
        const contract = new ethers.Contract(tokenAddr, ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"], signer);
        const balance = await contract.balanceOf(userAddress);
        const decimals = await contract.decimals();
        document.getElementById("totalAmount").value = parseFloat(ethers.formatUnits(balance, decimals)).toFixed(6);
      } catch(e) { alert("Could not fetch balance"); }
    }

    function addRecipient() {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row";
      row.innerHTML = `
        <input type="text" class="address" placeholder="0x...">
        <div class="percent-container">
          <input type="number" class="percent" placeholder="%" step="0.01" oninput="updatePercentTotal()">
        </div>
        <button class="delete-btn" onclick="this.parentElement.remove(); updatePercentTotal()">×</button>
      `;
      list.appendChild(row);
      updatePercentTotal();
    }

    function updatePercentTotal() {
      const percents = Array.from(document.querySelectorAll('.percent')).map(el => parseFloat(el.value) || 0);
      const total = percents.reduce((a, b) => a + b, 0);
      const el = document.getElementById("percent-total");
      el.textContent = `Total: ${total.toFixed(2)}%`;
      el.style.color = total === 100 ? "#00ffaa" : (total > 100 ? "#ff3366" : "#e0e0ff");
    }

    function loadTemplate(type) {
      const list = document.getElementById("recipients-list");
      list.innerHTML = "";
      if (type === 1) { addRow("0x0000000000000000000000000000000000000001", 50); addRow("0x0000000000000000000000000000000000000002", 50); }
      else if (type === 2) { addRow("0x0000000000000000000000000000000000000001", 33); addRow("0x0000000000000000000000000000000000000002", 33); addRow("0x0000000000000000000000000000000000000003", 34); }
      else if (type === 3) { addRow("0x0000000000000000000000000000000000000001", 40); addRow("0x0000000000000000000000000000000000000002", 60); }
    }

    function equalSplit() {
      const count = parseInt(document.getElementById("equalCount").value) || 4;
      if (count < 2 || count > 10) return alert("Number must be between 2 and 10");

      const list = document.getElementById("recipients-list");
      list.innerHTML = "";
      const percent = (100 / count).toFixed(2);

      for (let i = 1; i <= count; i++) {
        addRow(`0x000000000000000000000000000000000000000${i}`, parseFloat(percent));
      }
    }

    function addRow(address, percent) {
      const list = document.getElementById("recipients-list");
      const row = document.createElement("div");
      row.className = "recipient-row";
      row.innerHTML = `
        <input type="text" class="address" value="${address}">
        <div class="percent-container">
          <input type="number" class="percent" value="${percent}" oninput="updatePercentTotal()">
        </div>
        <button class="delete-btn" onclick="this.parentElement.remove(); updatePercentTotal()">×</button>
      `;
      list.appendChild(row);
      updatePercentTotal();
    }

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();

        const network = await provider.getNetwork();
        if (Number(network.chainId) !== CHAIN_ID) {
          try {
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [arcNetwork] });
              await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] });
            } else throw switchError;
          }
        }
        document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}`;
        await updateBalance();
      } catch (e) {
        document.getElementById("status").innerHTML = `Error: ${e.message}`;
      }
    }

    function disconnectWallet() {
      signer = null; userAddress = null;
      document.getElementById("status").innerHTML = "Wallet Disconnected";
    }

    function clearForm() {
      document.getElementById("recipients-list").innerHTML = "";
      document.getElementById("totalAmount").value = "100";
      addRecipient();
      addRecipient();
    }

    async function estimateGas(addresses, percentages, totalWei) {
      try {
        const splitterAbi = [{"inputs":[{"name":"recipients","type":"address[]"},{"name":"percentages","type":"uint256[]"},{"name":"totalAmount","type":"uint256"}],"name":"splitPayment","outputs":[],"stateMutability":"nonpayable","type":"function"}];
        const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
        const gasEstimate = await contract.splitPayment.estimateGas(addresses, percentages.map(p => Math.floor(p)), totalWei);
        return Math.floor(Number(gasEstimate) * 1.25);
      } catch (e) { return 500000; }
    }

    async function sendSplit() {
      if (!signer) return alert("Please connect your wallet first!");
      if (isProcessing) return;

      const totalAmount = parseFloat(document.getElementById("totalAmount").value);
      if (!totalAmount || totalAmount <= 0) return alert("Enter a valid amount!");

      const tokenAddr = await getCurrentToken();
      const symbol = await getTokenSymbol();

      if (tokenAddr !== "0x3600000000000000000000000000000000000000") {
        if (!confirm(`⚠️ Warning!\n\nThe Splitter contract is optimized for USDC.\nSending with ${symbol} may fail.\n\nContinue?`)) return;
      }

      const addresses = [];
      const percentages = [];

      document.querySelectorAll('.recipient-row').forEach(row => {
        const addr = row.querySelector('.address').value.trim();
        const perc = parseFloat(row.querySelector('.percent').value);
        if (addr && perc > 0) {
          addresses.push(addr);
          percentages.push(perc);
        }
      });

      if (addresses.length < 2) return alert("At least 2 recipients needed!");
      if (Math.abs(percentages.reduce((a, b) => a + b, 0) - 100) > 0.01) 
        return alert("Percentages must sum exactly to 100%!");

      for (let addr of addresses) {
        if (!ethers.isAddress(addr)) return alert(`Invalid address: ${addr}`);
      }

      let preview = `Send ${totalAmount} ${symbol}?\n\n`;
      addresses.forEach((addr, i) => preview += `• ${percentages[i]}% → ${addr.slice(0,8)}...\n`);

      if (!confirm(preview)) return;

      isProcessing = true;
      const btn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      btn.disabled = true;
      btn.textContent = "Processing...";

      try {
        statusEl.innerHTML = `<span class="spinner"></span> Approving ${symbol}...`;
        const tokenContract = new ethers.Contract(tokenAddr, ["function approve(address,uint256) returns (bool)", "function decimals() view returns (uint8)"], signer);
        const decimals = await tokenContract.decimals();
        const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);

        const gasLimit = await estimateGas(addresses, percentages, totalWei);
        await (await tokenContract.approve(CONTRACT_ADDRESS, totalWei)).wait();

        statusEl.innerHTML = `<span class="spinner"></span> Sending transaction...`;

        const splitterAbi = [{"inputs":[{"name":"recipients","type":"address[]"},{"name":"percentages","type":"uint256[]"},{"name":"totalAmount","type":"uint256"}],"name":"splitPayment","outputs":[],"stateMutability":"nonpayable","type":"function"}];
        const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
        const tx = await contract.splitPayment(addresses, percentages.map(p => Math.floor(p)), totalWei, { gasLimit });
        await tx.wait();

        transactions.unshift({
          hash: tx.hash,
          intent: `${totalAmount} ${symbol} → ${addresses.length} recipients`,
          time: new Date().toLocaleString()
        });
        localStorage.setItem('arcTxHistory', JSON.stringify(transactions));
        
        currentPage = 1;
        renderHistory();

        statusEl.innerHTML = `✅ Transaction Confirmed!<br>Hash: ${tx.hash}<br>
          <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View on Explorer</a>`;
      } catch (error) {
        statusEl.innerHTML = `❌ Error: ${error.message.substring(0,180)}...`;
      } finally {
        isProcessing = false;
        btn.disabled = false;
        btn.textContent = "Send Split Transaction";
      }
    }

    function renderHistory() {
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageTransactions = transactions.slice(start, end);

      let html = "";
      pageTransactions.forEach(tx => {
        html += `
          <div class="history-item">
            <small>${tx.time}</small><br>
            ${tx.intent}<br>
            <small><a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View Tx</a></small>
          </div>`;
      });

      document.getElementById("history").innerHTML = html || "<p>No transactions yet.</p>";
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(transactions.length / itemsPerPage);
      if (totalPages <= 1) {
        document.getElementById("pagination").innerHTML = "";
        return;
      }
      let html = `
        <button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
        <span style="margin:0 15px;">Page ${currentPage} of ${totalPages}</span>
        <button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
      `;
      document.getElementById("pagination").innerHTML = html;
    }

    function nextPage() {
      const totalPages = Math.ceil(transactions.length / itemsPerPage);
      if (currentPage < totalPages) { currentPage++; renderHistory(); }
    }

    function prevPage() {
      if (currentPage > 1) { currentPage--; renderHistory(); }
    }

    function exportHistory() {
      if (transactions.length === 0) return alert("No history to export!");
      const dataStr = JSON.stringify(transactions, null, 2);
      const a = document.createElement('a');
      a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
      a.download = `arc-splitter-history-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      alert("History exported successfully!");
    }
  </script>
</body>
</html>
