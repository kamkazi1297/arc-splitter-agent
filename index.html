<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f0f23, #1a1a2e); color: white; text-align: center; padding: 30px; }
    .container { max-width: 720px; margin: 0 auto; background: rgba(255,255,255,0.06); padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    button { padding: 14px 30px; font-size: 17px; margin: 10px; border-radius: 12px; cursor: pointer; }
    .connect-btn { background: #00ff9d; color: black; font-weight: bold; }
    .link-btn { background: #3498db; color: white; }
    .send-btn { background: #ff2d55; color: white; font-weight: bold; }
    input, textarea { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #1e1e2e; color: white; border: 1px solid #555; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>
    <p><strong>Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">🔗 Connect MetaMask</button>
    <p id="status"></p>

    <h3>Link Telegram Account</h3>
    <input type="text" id="telegram_id" placeholder="@username or Telegram ID" />
    <button class="link-btn" onclick="linkTelegram()">🔗 Link Telegram</button>

    <h3>Enter Split Intent</h3>
    <textarea id="intent" placeholder="Send 50 USDC, 40% to 0x123..., 60% to 0x456..."></textarea><br>
    
    <button class="send-btn" onclick="sendSplit()">🚀 Send Split Transaction</button>
  </div>

  <script>
    let signer = null;
    let userAddress = null;

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();
      document.getElementById("status").innerHTML = `✅ Wallet Connected: ${userAddress.substring(0,8)}...`;
    }

    async function linkTelegram() {
      if (!userAddress) {
        alert("First connect MetaMask!");
        return;
      }
      const tg = document.getElementById("telegram_id").value.trim();
      if (!tg) return alert("Enter your Telegram username or ID!");

      alert(`✅ Link request sent to Telegram!\n\nPlease check your Telegram bot and confirm the link.`);
      // بعداً به بک‌اند ارسال می‌کنیم
    }

    async function sendSplit() {
      if (!signer) return alert("Connect MetaMask first!");
      const intentText = document.getElementById("intent").value.trim();
      if (!intentText) return alert("Enter your intent!");

      alert("✅ Intent received. Transaction will be processed.");
    }
  </script>
</body>
</html>
