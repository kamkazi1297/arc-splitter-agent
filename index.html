<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; background: #1a1a2e; padding: 30px; border-radius: 16px; }
    button { padding: 14px 28px; margin: 10px; font-size: 17px; border-radius: 12px; cursor: pointer; }
    .connect { background: #00ff9d; color: black; font-weight: bold; }
    .send { background: #ff2d55; color: white; font-weight: bold; }
    textarea { width: 90%; height: 140px; padding: 15px; background: #16213e; color: white; border-radius: 12px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪓 Arc USDC Splitter</h1>
    <p><strong>Arc Testnet</strong></p>

    <button class="connect" onclick="connectWallet()">🔗 Connect MetaMask</button>
    <p id="status"></p>

    <h3>Enter Split Intent</h3>
    <textarea id="intent" placeholder="Send 50 USDC, 40% to 0x..., 60% to 0x..."></textarea><br>
    
    <button class="send" onclick="sendSplit()">🚀 Send Split Transaction</button>
  </div>

  <script>
    let signer = null;
    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";

    async function connectWallet() {
      if (!window.ethereum) return alert("MetaMask not found!");
      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const addr = await signer.getAddress();
        document.getElementById("status").innerHTML = `✅ Connected: ${addr}`;
      } catch (e) { document.getElementById("status").innerHTML = "❌ Failed"; }
    }

    function parseIntent(text) {
      const addresses = text.match(/0x[a-fA-F0-9]{40}/g) || [];
      const percents = text.match(/(\d+)[٪%]/g) || [];
      const percentages = percents.map(p => parseInt(p));
      const amount = text.match(/(\d+)\s*USDC/i);
      const total = amount ? parseInt(amount[1]) : 10;
      return {addresses, percentages, total};
    }

    async function sendSplit() {
      if (!signer) return alert("Connect MetaMask first!");
      const text = document.getElementById("intent").value.trim();
      if (!text) return alert("Enter intent!");

      const {addresses, percentages, total} = parseIntent(text);
      if (addresses.length === 0 || percentages.length === 0 || percentages.reduce((a,b)=>a+b,0) !== 100) {
        return alert("Invalid intent!");
      }

      try {
        document.getElementById("status").innerHTML = "⏳ Sending...";
        const abi = [{"inputs":[{"name":"recipients","type":"address[]"},{"name":"percentages","type":"uint256[]"},{"name":"totalAmount","type":"uint256"}],"name":"splitPayment","outputs":[],"stateMutability":"nonpayable","type":"function"}];
        const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);
        const tx = await contract.splitPayment(addresses, percentages, BigInt(total)*BigInt(1e6));
        await tx.wait();
        document.getElementById("status").innerHTML = `✅ Success! <br><a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View Transaction</a>`;
      } catch (e) {
        document.getElementById("status").innerHTML = "❌ Error: " + e.message.substring(0,100);
      }
    }
  </script>
</body>
</html>
