<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter - Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #0a0a1f, #1a1a35); 
      color: #e0e0ff; 
      margin: 0; padding: 20px; 
    }
    .container { 
      max-width: 780px; margin: 0 auto; 
      background: rgba(255,255,255,0.07); 
      padding: 40px; border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
    }
    h1 { color: #00ffaa; text-align: center; }
    button { 
      padding: 12px 24px; margin: 6px; font-size: 16px; 
      border: none; border-radius: 12px; cursor: pointer; 
    }
    .connect-btn { background: #00ffaa; color: #000; font-weight: bold; }
    .send-btn { background: #ff3366; color: white; font-weight: bold; }
    .export-btn { background: #3366ff; color: white; }
    .template-btn {
      background: #00aaff;
      color: white;
      font-size: 15px;
      padding: 10px 18px;
    }
    .small-btn {
      padding: 8px 16px;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    textarea { 
      width: 100%; height: 160px; padding: 16px; margin: 12px 0; 
      border-radius: 14px; background: #151525; color: white; 
      border: 1px solid #00ffaa; font-family: monospace; 
    }
    #status { margin: 20px 0; padding: 18px; border-radius: 12px; min-height: 110px; }
    .balance { font-size: 18px; color: #00ffaa; margin: 15px 0; font-weight: bold; }
    .success { background: rgba(0,255,100,0.15); }
    .error { background: rgba(255,50,50,0.15); }
    .loading::after {
      content: " ⏳";
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Arc USDC Splitter</h1>
    <p><strong>Professional • Arc Testnet</strong></p>

    <button class="connect-btn" onclick="connectWallet()">Connect MetaMask</button>
    <button onclick="disconnectWallet()">Disconnect</button>

    <p id="status">Ready</p>
    
    <div class="balance">
      USDC Balance: <strong id="balanceAmount">Not connected</strong>
      <button class="small-btn" onclick="getRealBalance()" style="background:#00cc88; color:white;">Refresh</button>
    </div>

    <h3>Quick Templates</h3>
    <div>
      <button class="template-btn" onclick="loadTemplate(1)">50% - 50% Split</button>
      <button class="template-btn" onclick="loadTemplate(2)">33% - 33% - 34%</button>
      <button class="template-btn" onclick="loadTemplate(3)">40% - 60% Split</button>
      <button class="template-btn" onclick="loadTemplate(4)">Equal Split (4 addresses)</button>
    </div>

    <h3>Enter Split Intent</h3>
    <textarea id="intent" placeholder="Example: Send 100 USDC, 40% to 0x123..., 60% to 0x456..."></textarea>
    
    <button id="sendBtn" class="send-btn" onclick="sendSplit()">Send Real Transaction</button>
    <button class="export-btn" onclick="exportHistory()">Export History</button>
    <button class="small-btn" onclick="clearIntent()" style="background:#666; color:white;">Clear Text</button>

    <h3>Recent Transactions</h3>
    <div id="history"></div>
  </div>

  <script>
    let signer = null;
    let userAddress = null;
    let transactions = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
    let isProcessing = false;

    const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";
    const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
    const CHAIN_ID = 5042002;
    const CHAIN_ID_HEX = "0x4cef52";

    const arcNetwork = {
      chainId: CHAIN_ID_HEX,
      chainName: "Arc Testnet",
      nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
      rpcUrls: ["https://rpc.testnet.arc.network"],
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    };

    window.addEventListener('load', async () => {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts.length > 0) {
            userAddress = accounts[0];
            const provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            
            document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}`;
            document.getElementById("status").className = "success";
            await getRealBalance();
          }
        } catch (e) {}
      }
      renderHistory();
    });

    async function connectWallet() { /* همان کد قبلی */ 
      if (!window.ethereum) return alert("MetaMask not found!");
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        const provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();

        const network = await provider.getNetwork();
        if (Number(network.chainId) !== CHAIN_ID) {
          try {
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [arcNetwork] });
              await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] });
            } else throw switchError;
          }
        }

        document.getElementById("status").innerHTML = `Connected: ${userAddress.slice(0,8)}...${userAddress.slice(-6)}`;
        document.getElementById("status").className = "success";
        await getRealBalance();
      } catch (e) {
        document.getElementById("status").innerHTML = `Error: ${e.message}`;
        document.getElementById("status").className = "error";
      }
    }

    function disconnectWallet() {
      signer = null; userAddress = null;
      document.getElementById("status").innerHTML = "Wallet Disconnected";
      document.getElementById("balanceAmount").innerHTML = "Not connected";
    }

    async function getRealBalance() {
      if (!signer) return;
      const balanceEl = document.getElementById("balanceAmount");
      balanceEl.innerHTML = "Checking...";

      try {
        const usdcAbi = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];
        const usdc = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
        const [bal, decimals] = await Promise.all([usdc.balanceOf(userAddress), usdc.decimals()]);
        const formatted = ethers.formatUnits(bal, decimals);
        balanceEl.innerHTML = parseFloat(formatted).toFixed(4);
      } catch (e) {
        balanceEl.innerHTML = "Error";
      }
    }

    function loadTemplate(type) {
      const textarea = document.getElementById("intent");
      if (type === 1) textarea.value = "Send 100 USDC, 50% to 0x0000000000000000000000000000000000000001, 50% to 0x0000000000000000000000000000000000000002";
      else if (type === 2) textarea.value = "Send 300 USDC, 33% to 0x0000000000000000000000000000000000000001, 33% to 0x0000000000000000000000000000000000000002, 34% to 0x0000000000000000000000000000000000000003";
      else if (type === 3) textarea.value = "Send 100 USDC, 40% to 0x0000000000000000000000000000000000000001, 60% to 0x0000000000000000000000000000000000000002";
      else if (type === 4) textarea.value = "Send 200 USDC, 25% to 0x0000000000000000000000000000000000000001, 25% to 0x0000000000000000000000000000000000000002, 25% to 0x0000000000000000000000000000000000000003, 25% to 0x0000000000000000000000000000000000000004";
    }

    function clearIntent() {
      document.getElementById("intent").value = "";
    }

    async function sendSplit() { /* همان کد قدم قبل */ 
      if (!signer) return alert("Please connect your wallet first!");
      if (isProcessing) return;

      const intentText = document.getElementById("intent").value.trim();
      if (!intentText) return alert("Please enter an intent!");

      const addresses = intentText.match(/0x[a-fA-F0-9]{40}/g) || [];
      const percentMatches = intentText.match(/(\d+)[٪%]/g) || [];
      const percentages = percentMatches.map(p => parseInt(p));
      const amountMatch = intentText.match(/(\d+)\s*USDC/i);
      const totalAmount = amountMatch ? parseInt(amountMatch[1]) : 10;

      if (addresses.length < 2 || percentages.length < 2) 
        return alert("Could not detect addresses and percentages correctly!");

      if (percentages.reduce((a, b) => a + b, 0) !== 100) 
        return alert("Percentages must sum exactly to 100%!");

      let previewText = `You are about to send ${totalAmount} USDC:\n\n`;
      for (let i = 0; i < addresses.length; i++) {
        const share = (totalAmount * percentages[i] / 100).toFixed(2);
        previewText += `• ${percentages[i]}% → ${addresses[i].slice(0,8)}... = ${share} USDC\n`;
      }
      previewText += "\nDo you want to continue?";

      if (!confirm(previewText)) return;

      isProcessing = true;
      const sendBtn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      
      sendBtn.disabled = true;
      sendBtn.textContent = "Processing...";

      try {
        statusEl.innerHTML = "Approving USDC...";
        statusEl.className = "loading";

        const usdcAbi = ["function approve(address spender, uint256 amount) returns (bool)", "function decimals() view returns (uint8)"];
        const usdc = new ethers.Contract(USDC_ADDRESS, usdcAbi, signer);
        const decimals = await usdc.decimals();
        const totalWei = ethers.parseUnits(totalAmount.toString(), decimals);

        const approveTx = await usdc.approve(CONTRACT_ADDRESS, totalWei * 2n);
        await approveTx.wait();

        statusEl.innerHTML = "Sending Split Transaction...";

        const splitterAbi = [{
          "inputs": [{"name": "recipients", "type": "address[]"}, {"name": "percentages", "type": "uint256[]"}, {"name": "totalAmount", "type": "uint256"}],
          "name": "splitPayment", "outputs": [], "stateMutability": "nonpayable", "type": "function"
        }];

        const contract = new ethers.Contract(CONTRACT_ADDRESS, splitterAbi, signer);
        const tx = await contract.splitPayment(addresses, percentages, totalWei);
        await tx.wait();

        transactions.unshift({ hash: tx.hash, intent: intentText.substring(0, 100), time: new Date().toLocaleString() });
        localStorage.setItem('arcTxHistory', JSON.stringify(transactions));
        renderHistory();

        statusEl.className = "success";
        statusEl.innerHTML = `✅ Transaction Confirmed!<br><br>Hash: ${tx.hash}<br><br>
          <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" style="color:#00ffaa;">View on Explorer</a>`;

      } catch (error) {
        console.error(error);
        statusEl.className = "error";
        statusEl.innerHTML = `Error: ${error.message.substring(0, 150)}...`;
      } finally {
        isProcessing = false;
        sendBtn.disabled = false;
        sendBtn.textContent = "Send Real Transaction";
      }
    }

    function renderHistory() {
      let html = "";
      transactions.forEach(tx => {
        html += `
          <div style="background:rgba(255,255,255,0.05); padding:14px; margin:10px 0; border-radius:12px;">
            <small>${tx.time}</small><br>
            ${tx.intent}<br>
            <small><a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View Tx</a></small>
          </div>`;
      });
      document.getElementById("history").innerHTML = html || "<p>No transactions yet.</p>";
    }

    function exportHistory() {
      if (transactions.length === 0) return alert("No history to export!");
      const dataStr = JSON.stringify(transactions, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
      const link = document.createElement('a');
      link.href = dataUri;
      link.download = `arc-splitter-history-${new Date().toISOString().slice(0,10)}.json`;
      link.click();
      alert("History exported successfully!");
    }
  </script>
</body>
</html>
