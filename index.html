<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f23; color: #fff; margin: 0; padding: 20px; }
    .container { max-width: 700px; margin: auto; }
    h1 { text-align: center; }
    textarea, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
    button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .btn-primary { background: #00d4ff; color: black; }
    .status { padding: 15px; margin: 10px 0; border-radius: 8px; }
    .history { margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Arc USDC Splitter</h1>
    
    <button id="connectButton" class="btn-primary" onclick="connectWallet()">اتصال به MetaMask</button>
    
    <textarea id="intentInput" rows="4" placeholder="مثال: 0x123... 40% to 0x456... 60% total 100 USDC"></textarea>
    
    <button id="sendButton" class="btn-primary" onclick="sendSplit()" disabled>ارسال تراکنش</button>
    
    <div id="status" class="status"></div>
    
    <div class="history">
      <h2>تاریخچه تراکنش‌ها</h2>
      <button onclick="exportHistory()">دانلود تاریخچه (JSON)</button>
      <button onclick="clearHistory()">پاک کردن تاریخچه</button>
      <div id="historyList"></div>
    </div>
  </div>

<script>
// ==================== تنظیمات Arc Testnet ====================
const CONTRACT_ADDRESS = "0xEa86B2d60029bEE76F6858a1Ac7f85B2944004bF";
const CHAIN_ID = "0x4ce9f2";           // 5042002
const RPC_URL = "https://rpc.testnet.arc.network";
const EXPLORER_URL = "https://testnet.arcscan.app";

const NETWORK_PARAMS = {
  chainId: CHAIN_ID,
  chainName: "Arc Testnet",
  nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
  rpcUrls: [RPC_URL],
  blockExplorerUrls: [EXPLORER_URL]
};

let provider, signer, currentAccount;

// ==================== اتصال والت ====================
async function connectWallet() {
  if (!window.ethereum) {
    alert("MetaMask نصب نیست!");
    return;
  }

  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    currentAccount = accounts[0];

    const switched = await switchToArcNetwork();
    if (!switched) return;

    document.getElementById('connectButton').innerHTML = `✅ متصل: ${currentAccount.slice(0,6)}...${currentAccount.slice(-4)}`;
    document.getElementById('sendButton').disabled = false;

    showStatus("✅ به Arc Testnet متصل شد", "green");
  } catch (error) {
    console.error(error);
    alert("خطا در اتصال: " + error.message);
  }
}

// ==================== اضافه کردن و سوئیچ شبکه ====================
async function switchToArcNetwork() {
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: CHAIN_ID }]
    });
    return true;
  } catch (switchError) {
    if (switchError.code === 4902) {   // شبکه اضافه نشده
      try {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [NETWORK_PARAMS]
        });
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: CHAIN_ID }]
        });
        return true;
      } catch (addError) {
        alert("اضافه کردن شبکه Arc Testnet ناموفق بود.");
        console.error(addError);
        return false;
      }
    } else {
      alert("خطا در سوئیچ شبکه: " + switchError.message);
      return false;
    }
  }
}

// ==================== ارسال تراکنش ====================
async function sendSplit() {
  const text = document.getElementById('intentInput').value.trim();
  if (!text) return alert("لطفا متن را وارد کنید");

  const { addresses, percentages, totalAmount } = parseIntent(text);
  
  if (addresses.length === 0 || addresses.length !== percentages.length) {
    return alert("آدرس‌ها یا درصد‌ها اشتباه است");
  }

  try {
    showStatus("در حال آماده‌سازی تراکنش...", "blue");

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();

    const abi = [
      "function splitPayment(address[] recipients, uint256[] percentages, uint256 totalAmount)"
    ];

    const contract = new ethers.Contract(CONTRACT_ADDRESS, abi, signer);

    const totalWei = ethers.parseUnits(totalAmount.toString(), 18);

    showStatus("در حال امضای تراکنش...", "blue");

    const tx = await contract.splitPayment(addresses, percentages, totalWei);
    
    showStatus(`تراکنش ارسال شد! Hash: ${tx.hash}`, "blue");

    await tx.wait();
    
    showStatus(`✅ تراکنش با موفقیت انجام شد! <a href="${EXPLORER_URL}/tx/${tx.hash}" target="_blank">مشاهده در اکسپلورر</a>`, "green");

    addToHistory(text, tx.hash);

  } catch (error) {
    console.error(error);
    showStatus("خطا: " + error.message, "red");
  }
}

// ==================== پارس کردن متن ====================
function parseIntent(text) {
  const addressPattern = /0x[a-fA-F0-9]{40}/g;
  const percentPattern = /(\d+)%/g;
  const amountPattern = /(\d+)\s*USDC/i;

  const addresses = text.match(addressPattern) || [];
  const percentMatches = text.match(percentPattern) || [];
  const percentages = percentMatches.map(p => parseInt(p));
  const amountMatch = text.match(amountPattern);
  const totalAmount = amountMatch ? parseInt(amountMatch[1]) : 0;

  return { addresses, percentages, totalAmount };
}

// ==================== تاریخچه ====================
function addToHistory(intent, hash) {
  let history = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
  history.unshift({
    time: new Date().toLocaleString('fa-IR'),
    intent: intent.substring(0, 80),
    hash: hash
  });
  localStorage.setItem('arcTxHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('arcTxHistory') || '[]');
  let html = '<ul>';
  history.forEach(item => {
    html += `<li>${item.time} - ${item.intent} ... <a href="${EXPLORER_URL}/tx/${item.hash}" target="_blank">مشاهده</a></li>`;
  });
  html += '</ul>';
  document.getElementById('historyList').innerHTML = html;
}

function exportHistory() {
  const history = localStorage.getItem('arcTxHistory');
  if (!history) return alert("تاریخچه‌ای وجود ندارد");
  const blob = new Blob([history], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'arc-splitter-history.json';
  a.click();
}

function clearHistory() {
  if (confirm("آیا تاریخچه پاک شود؟")) {
    localStorage.removeItem('arcTxHistory');
    renderHistory();
  }
}

function showStatus(message, color) {
  const statusEl = document.getElementById('status');
  statusEl.innerHTML = message;
  statusEl.style.background = color === "green" ? "#004d00" : color === "red" ? "#4d0000" : "#00334d";
}

// بارگذاری تاریخچه هنگام باز کردن صفحه
window.onload = () => {
  renderHistory();
};
</script>
</body>
</html>
