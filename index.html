<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc USDC Splitter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 40px; 
      background: #0a0a0a; 
      color: white;
    }
    button { 
      padding: 15px 30px; 
      font-size: 18px; 
      margin: 15px; 
      border-radius: 8px;
      cursor: pointer;
    }
    #status { margin: 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>🪓 Arc USDC Splitter</h1>
  <p><strong>Arc Testnet</strong></p>

  <button onclick="connectWallet()">🔗 Connect MetaMask</button>
  
  <p id="status"></p>

  <script>
    let signer = null;
    let address = null;

    async function connectWallet() {
      const statusEl = document.getElementById("status");
      
      if (!window.ethereum) {
        statusEl.innerHTML = "❌ MetaMask not found! Please install MetaMask.";
        return;
      }

      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        
        signer = await provider.getSigner();
        address = await signer.getAddress();

        statusEl.innerHTML = `✅ Connected!<br><small>${address}</small>`;
        console.log("Wallet connected:", address);
        
      } catch (error) {
        statusEl.innerHTML = "❌ Connection failed: " + error.message;
      }
    }
  </script>
</body>
</html>
