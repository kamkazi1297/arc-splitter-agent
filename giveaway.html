<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcSplit Giveaway - Create & Distribute</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
    }
    
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
    }
    .light .glass {
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.12);
    }

    .light body, .light h1, .light h3, .light label {
      color: #1f2937;
    }

    select, input {
      background-color: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .light select, .light input {
      background-color: #f8fafc;
      color: #1f2937;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0b0b1f] to-[#1a1a2e] text-white min-h-screen">

  <div class="max-w-2xl mx-auto px-4 py-10">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="absolute inset-[-10px] bg-gradient-to-r from-pink-500 to-rose-500 rounded-2xl blur-xl opacity-30"></div>
          <h1 class="text-4xl font-bold relative z-10">Giveaway Tool</h1>
        </div>
      </div>
      <a href="/" class="text-gray-400 hover:text-white flex items-center gap-2">
        <i class="fas fa-home"></i> Hub
      </a>
    </div>

    <div class="glass border border-white/10 rounded-3xl p-8">

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Select Token</label>
        <select id="tokenSelect" class="w-full rounded-2xl px-6 py-5 focus:border-pink-500 outline-none text-base">
          <option value="0x3600000000000000000000000000000000000000">USDC</option>
          <option value="0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a">EURC</option>
          <option value="0xf0C4a4CE82A5746AbAAd9425360Ab04fbBA432BF">cirBTC</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-gray-400 text-sm mb-2">Total Amount</label>
          <input type="number" id="totalAmount" value="100" step="0.000001" 
                 class="w-full rounded-2xl px-6 py-5 text-2xl outline-none">
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Number of Winners</label>
          <input type="number" id="winnerCount" value="10" min="1" max="100"
                 class="w-full rounded-2xl px-6 py-5 text-2xl outline-none">
        </div>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-2">Giveaway Description</label>
        <textarea id="description" rows="3" 
                  class="w-full rounded-2xl px-6 py-5 bg-white/5 border border-white/20 outline-none resize-none"
                  placeholder="مثال: کامنت بذارید و ۱۰ دلار USDC بگیرید!"></textarea>
      </div>

      <!-- Twitter Ready Text -->
      <div class="mb-8">
        <button onclick="generateTweetText()" 
                class="w-full py-4 bg-[#1DA1F2] hover:bg-[#1a8cd8] rounded-2xl font-medium flex items-center justify-center gap-3">
          <i class="fab fa-twitter"></i>
          Generate Twitter Post Text
        </button>
      </div>

      <div class="mb-8">
        <label class="block text-gray-400 text-sm mb-3">Recipients / Winners Wallets</label>
        <textarea id="winnersList" rows="8" 
                  class="w-full rounded-2xl px-6 py-5 bg-white/5 border border-white/20 font-mono text-sm outline-none"
                  placeholder="هر آدرس در یک خط"></textarea>
        <button onclick="addRandomWinners()" 
                class="mt-3 text-pink-400 hover:text-pink-300 text-sm flex items-center gap-2">
          <i class="fas fa-random"></i> Add Random Test Addresses
        </button>
      </div>

      <button onclick="createGiveawaySplit()" 
              class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-7 rounded-3xl text-xl font-bold mt-4">
        Create Split & Send to Winners
      </button>
    </div>
  </div>

<script>
// توابع اصلی Giveaway
function generateTweetText() {
  const amount = document.getElementById("totalAmount").value;
  const token = document.getElementById("tokenSelect").selectedOptions[0].text;
  const winners = document.getElementById("winnerCount").value;
  const desc = document.getElementById("description").value || "";

  const text = `🎁 GIVEAWAY TIME!\n\n` +
               `${amount} ${token} to ${winners} lucky winners!\n\n` +
               `${desc}\n\n` +
               `1. Follow + Like\n` +
               `2. Comment your wallet address\n\n` +
               `Good luck! 🔥\n\n` +
               `#ArcTestnet #Giveaway`;

  navigator.clipboard.writeText(text);
  alert("✅ Twitter text copied to clipboard!");
}

function addRandomWinners() {
  const list = document.getElementById("winnersList");
  let text = "";
  const count = parseInt(document.getElementById("winnerCount").value) || 5;
  
  for(let i = 0; i < count; i++) {
    const fakeAddr = "0x" + Array(40).fill(0).map(() => Math.floor(Math.random()*16).toString(16)).join('');
    text += fakeAddr + "\n";
  }
  list.value = text;
}

async function createGiveawaySplit() {
  // بعداً با ethers.js کامل می‌کنیم
  alert("🎉 Giveaway Split آماده شد!\n\nدر نسخه نهایی اینجا تراکنش ساخته و ارسال می‌شه.");
}

// بعداً می‌تونیم والت کانکت و ارسال تراکنش رو مثل سایت اصلی اضافه کنیم
</script>
</body>
</html>
